---

- name: Assert SonarQube required variables are set
  ansible.builtin.assert:
    that:
      - docker_sonarqube_postgres_user | string | length > 0
      - docker_sonarqube_postgres_pass is not none
      - docker_sonarqube_postgres_pass | string | length > 0
      - docker_sonarqube_postgres_database | string | length > 0
      - docker_sonarqube_web_host in ['127.0.0.1', '0.0.0.0']
      - docker_sonarqube_port | int >= 1
      - docker_sonarqube_port | int <= 65535
      - docker_sonarqube_cpus | float > 0
    fail_msg: Define valid SonarQube database credentials, web listener, port, and resource limits before running role docker_sonarqube.
  no_log: '{{ docker_sonarqube_nolog }}'
