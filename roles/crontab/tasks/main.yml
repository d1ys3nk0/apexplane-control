---

- name: Validate crontab variable contract
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate.yml"

- name: Store managed crontab users
  ansible.builtin.set_fact:
    crontab_managed_users: "{{ crontab_jobs.keys() | list }}"

- name: Reconcile managed user crontab
  when: crontab_managed_users | length > 0
  block:
    - name: Render desired user crontab content
      ansible.builtin.set_fact:
        crontab_desired_by_user: >-
          {{ crontab_desired_by_user | default({}) | combine({item: lookup('template', 'user.crontab.j2')}) }}
      loop: '{{ crontab_managed_users }}'
      loop_control:
        label: '{{ item }}'
      changed_when: false

    - name: Compare managed user crontab
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        user={{ item | quote }}
        desired_json={{ crontab_desired_by_user[item] | to_json | quote }}

        python3 - "$user" "$desired_json" <<'PY'
        import json
        import subprocess
        import sys
        from collections import Counter
        from difflib import unified_diff

        def build_plan(user, current, desired, current_exists):
            desired_empty = desired == ""
            current_lines = current.splitlines()
            desired_line_counts = Counter(desired.splitlines())
            removed_lines = []
            for line_number, text in enumerate(current_lines, start=1):
                if desired_line_counts[text] > 0:
                    desired_line_counts[text] -= 1
                    continue
                removed_lines.append({"line": line_number, "text": text, "display": json.dumps(text)})
            changed = current != desired or (desired_empty and current_exists)
            destructive = bool(removed_lines)
            diff_lines = list(
                unified_diff(
                    current.splitlines(),
                    desired.splitlines(),
                    fromfile=f"current/{user}",
                    tofile=f"repository/{user}",
                    lineterm="",
                )
            )
            return {
                "user": user,
                "changed": changed,
                "diff_lines": diff_lines,
                "destructive": destructive,
                "desired_empty": desired_empty,
                "removed_lines": removed_lines,
            }

        if len(sys.argv) == 5:
            user, current_json, desired_json, current_exists_raw = sys.argv[1:5]
            current = json.loads(current_json)
            desired = json.loads(desired_json)
            current_exists = current_exists_raw == "1"
        else:
            user, desired_json = sys.argv[1:3]
            desired = json.loads(desired_json)
            current_result = subprocess.run(["crontab", "-l", "-u", user], capture_output=True, text=True, check=False)
            current_exists = current_result.returncode == 0
            current = current_result.stdout if current_exists else ""

        print(json.dumps(build_plan(user, current, desired, current_exists), sort_keys=True))
        PY
      args:
        executable: /bin/bash
      changed_when: false
      loop: '{{ crontab_managed_users }}'
      loop_control:
        label: '{{ item }}'
      register: crontab_compare_results
      check_mode: false

    - name: Store crontab reconciliation plan
      ansible.builtin.set_fact:
        crontab_reconciliation: "{{ crontab_compare_results.results | map(attribute='stdout') | map('from_json') | list }}"

    - name: Store changed managed crontab
      ansible.builtin.set_fact:
        crontab_install_users: >-
          {{ crontab_reconciliation | selectattr('changed') | rejectattr('desired_empty') | map(attribute='user') | list }}
        crontab_remove_users: >-
          {{ crontab_reconciliation | selectattr('changed') | selectattr('desired_empty') | map(attribute='user') | list }}
        crontab_empty_users: "{{ crontab_reconciliation | selectattr('desired_empty') | map(attribute='user') | list }}"
        crontab_changed_reconciliation: "{{ crontab_reconciliation | selectattr('diff_lines') | list }}"
        crontab_changed_users: "{{ crontab_reconciliation | selectattr('diff_lines') | map(attribute='user') | list }}"

    - name: Refuse changed crontab reconciliation in non-interactive mode
      ansible.builtin.fail:
        msg: >-
          Managed crontabs differ from repository declarations while INTERACTIVE is disabled:
          {{ crontab_changed_users | join(', ') }}. Run interactively to approve replacement, set YES=1 or YES=true,
          or update the remote crontab manually.
      when:
        - not ansible_check_mode
        - not (crontab_interactive_mode | bool)
        - not (crontab_yes_mode | bool)
        - crontab_changed_users | length > 0

    - name: Report changed crontab reconciliation in check mode
      ansible.builtin.debug:
        msg: |-
          Existing crontabs would be replaced during repository reconciliation.
          Diff between current crontab and repository-managed crontab:
          {% for entry in crontab_changed_reconciliation %}
          - {{ entry.user }}
          {% for line in entry.diff_lines %}
            {{ line }}
          {% endfor %}
          {% endfor %}
      changed_when: true
      when:
        - ansible_check_mode
        - crontab_changed_users | length > 0

    - name: Confirm changed crontab reconciliation
      ansible.builtin.pause:
        prompt: |-
          Existing crontabs will be replaced during repository reconciliation.
          Diff between current crontab and repository-managed crontab:
          {% for entry in crontab_changed_reconciliation %}
          - {{ entry.user }}
          {% for line in entry.diff_lines %}
            {{ line }}
          {% endfor %}
          {% endfor %}

          Type "yes" to proceed
      register: crontab_reconciliation_approval
      when:
        - not ansible_check_mode
        - crontab_interactive_mode | bool
        - not (crontab_yes_mode | bool)
        - crontab_changed_users | length > 0

    - name: Refuse changed crontab reconciliation without typed approval
      ansible.builtin.fail:
        msg: Changed crontab reconciliation was not approved. Type exactly "yes" to proceed.
      when:
        - not ansible_check_mode
        - crontab_interactive_mode | bool
        - not (crontab_yes_mode | bool)
        - crontab_changed_users | length > 0
        - crontab_reconciliation_approval.user_input | default('') != 'yes'

    - name: Install managed user crontab
      become: true
      ansible.builtin.command:
        argv:
          - crontab
          - -u
          - '{{ item }}'
          - '-'
        stdin: '{{ crontab_desired_by_user[item] }}'
        stdin_add_newline: false
      changed_when: true
      loop: '{{ crontab_install_users }}'
      loop_control:
        label: '{{ item }}'
      when: not ansible_check_mode

    - name: Remove empty managed user crontab
      become: true
      ansible.builtin.command:
        argv:
          - crontab
          - -r
          - -u
          - '{{ item }}'
      changed_when: true
      loop: '{{ crontab_remove_users }}'
      loop_control:
        label: '{{ item }}'
      when: not ansible_check_mode

    - name: Delete empty managed user crontab file
      become: true
      ansible.builtin.file:
        path: '{{ crontab_spool_dir }}/{{ item }}'
        state: absent
      loop: '{{ crontab_empty_users }}'
      loop_control:
        label: '{{ item }}'
      when: not ansible_check_mode
