---

docker_wg_easy_ci_mode: "{{ lookup('env', 'CI') | default('0', true) in ['1', 'true'] }}"
docker_wg_easy_debug_mode: "{{ lookup('env', 'DEBUG') | default('0', true) in ['1', 'true'] }}"
docker_wg_easy_nolog: '{{ (docker_wg_easy_ci_mode | bool) and not (docker_wg_easy_debug_mode | bool) }}'
docker_wg_easy_db_path: '{{ docker_wg_easy_data_dir }}/wg-easy.db'
docker_wg_easy_base_env:
  PORT: '{{ docker_wg_easy_web_port | string }}'
  HOST: '{{ docker_wg_easy_web_host }}'
  INSECURE: '{{ docker_wg_easy_insecure | string | lower }}'
  DISABLE_IPV6: '{{ docker_wg_easy_disable_ipv6 | string | lower }}'
docker_wg_easy_required_init_env:
  INIT_ENABLED: 'true'
  INIT_USERNAME: '{{ docker_wg_easy_init_username }}'
  INIT_PASSWORD: '{{ docker_wg_easy_init_password }}'
  INIT_HOST: '{{ docker_wg_easy_init_host }}'
  INIT_PORT: '{{ docker_wg_easy_init_port | string }}'
  INIT_IPV4_CIDR: '{{ docker_wg_easy_init_ipv4_cidr }}'
  INIT_IPV6_CIDR: '{{ docker_wg_easy_init_ipv6_cidr }}'
docker_wg_easy_dns_init_env:
  INIT_DNS: '{{ docker_wg_easy_init_dns | join(",") }}'
docker_wg_easy_allowed_ips_init_env:
  INIT_ALLOWED_IPS: '{{ docker_wg_easy_init_allowed_ips | join(",") }}'
docker_wg_easy_optional_init_env: >-
  {{
    (docker_wg_easy_dns_init_env if docker_wg_easy_init_dns | length > 0 else {})
    | combine(
      docker_wg_easy_allowed_ips_init_env if docker_wg_easy_init_allowed_ips | length > 0 else {}
    )
  }}
docker_wg_easy_init_env: '{{ docker_wg_easy_required_init_env | combine(docker_wg_easy_optional_init_env) }}'
docker_wg_easy_bootstrap_env: '{{ docker_wg_easy_base_env | combine(docker_wg_easy_init_env) }}'
docker_wg_easy_ports:
  - '{{ docker_wg_easy_wireguard_port }}:{{ docker_wg_easy_wireguard_port }}/udp'
  - '{{ docker_wg_easy_web_publish_host }}:{{ docker_wg_easy_web_port }}:{{ docker_wg_easy_web_port }}/tcp'
docker_wg_easy_sysctls:
  net.ipv4.ip_forward: '1'
  net.ipv4.conf.all.src_valid_mark: '1'
