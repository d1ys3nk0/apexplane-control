---

- name: Run host audit script
  become: true
  ansible.builtin.command:
    argv:
      - /opt/toolbox/bin/audit_host
  environment:
    AUDIT_SSH_PORT: '{{ audit_ssh_port | string }}'
    AUDIT_SSH_USERS: "{{ audit_ssh_users | join('\n') }}"
    AUDIT_ADMIN_USERS: "{{ audit_admin_users | join('\n') }}"
    AUDIT_SERVICE_USERS: "{{ audit_service_users | join('\n') }}"
    AUDIT_DISK_THRESHOLD: '{{ audit_disk_threshold | string }}'
    AUDIT_CRITICAL_SYSTEMD_UNITS: "{{ audit_critical_systemd_units | join('\n') }}"
    AUDIT_INACTIVE_SYSTEMD_UNITS: "{{ audit_inactive_systemd_units | join('\n') }}"
    AUDIT_RUNNING_SYSTEMD_UNIT_FILE_STATES: "{{ audit_running_systemd_unit_file_states | join('\n') }}"
    AUDIT_SYSTEMD_LOG_SINCE_JOURNAL: '{{ audit_systemd_log_since_journal }}'
    AUDIT_LOG_ERROR_REGEX: '{{ audit_log_error_regex }}'
    AUDIT_LOG_IGNORE_REGEX: '{{ audit_log_ignore_regex }}'
    AUDIT_LOG_MATCH_LIMIT: '{{ audit_log_match_limit | string }}'
    AUDIT_SYSCTL_PARAMS_JSON: '{{ audit_sysctl_params | to_json }}'
  changed_when: false

- name: Install host audit environment
  become: true
  ansible.builtin.copy:
    dest: /etc/default/audit-host
    mode: '0644'
    owner: root
    group: root
    content: |
      AUDIT_SSH_PORT={{ audit_ssh_port | string | quote }}
      AUDIT_SSH_USERS={{ audit_ssh_users | join('\n') | quote }}
      AUDIT_ADMIN_USERS={{ audit_admin_users | join('\n') | quote }}
      AUDIT_SERVICE_USERS={{ audit_service_users | join('\n') | quote }}
      AUDIT_DISK_THRESHOLD={{ audit_disk_threshold | string | quote }}
      AUDIT_CRITICAL_SYSTEMD_UNITS={{ audit_critical_systemd_units | join('\n') | quote }}
      AUDIT_INACTIVE_SYSTEMD_UNITS={{ audit_inactive_systemd_units | join('\n') | quote }}
      AUDIT_RUNNING_SYSTEMD_UNIT_FILE_STATES={{ audit_running_systemd_unit_file_states | join('\n') | quote }}
      AUDIT_SYSTEMD_LOG_SINCE_JOURNAL={{ audit_systemd_log_since_journal | quote }}
      AUDIT_LOG_ERROR_REGEX={{ audit_log_error_regex | quote }}
      AUDIT_LOG_IGNORE_REGEX={{ audit_log_ignore_regex | quote }}
      AUDIT_LOG_MATCH_LIMIT={{ audit_log_match_limit | string | quote }}
      AUDIT_SYSCTL_PARAMS_JSON={{ audit_sysctl_params | to_json | quote }}
  when: audit_cron_enabled | bool

- name: Install daily host audit cron job
  become: true
  ansible.builtin.copy:
    dest: /etc/cron.d/audit-host
    mode: '0644'
    owner: root
    group: root
    content: |
      CRON_TZ=UTC
      {{ audit_cron_minute }} {{ audit_cron_hour }} * * * root . /etc/default/audit-host; /opt/toolbox/bin/audit_host --quiet > {{ audit_cron_log_path }}
  when: audit_cron_enabled | bool

- name: Remove daily host audit cron job
  become: true
  ansible.builtin.file:
    path: /etc/cron.d/audit-host
    state: absent
  when: not audit_cron_enabled | bool

- name: Remove host audit environment
  become: true
  ansible.builtin.file:
    path: /etc/default/audit-host
    state: absent
  when: not audit_cron_enabled | bool
