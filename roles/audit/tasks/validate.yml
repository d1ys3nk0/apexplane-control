---

- name: Validate audit list inputs
  ansible.builtin.assert:
    that:
      - audit_ssh_users is not string
      - audit_ssh_users is iterable
      - audit_admin_users is not string
      - audit_admin_users is iterable
      - audit_service_users is not string
      - audit_service_users is iterable
      - audit_critical_systemd_units is not string
      - audit_critical_systemd_units is iterable
      - audit_inactive_systemd_units is not string
      - audit_inactive_systemd_units is iterable
      - audit_running_systemd_unit_file_states is not string
      - audit_running_systemd_unit_file_states is iterable
      - audit_sysctl_params is not string
      - audit_sysctl_params is iterable
      - audit_log_match_limit | int > 0
      - audit_cron_hour | string | regex_search('^([01]?[0-9]|2[0-3])$')
      - audit_cron_minute | string | regex_search('^([0-5]?[0-9])$')
      - audit_cron_log_path is string
      - audit_cron_log_path.startswith('/')
    fail_msg: Audit inputs must be valid lists, cron settings, and positive audit_log_match_limit.

- name: Validate audit systemd units
  ansible.builtin.assert:
    that:
      - item | string | trim | length > 0
    fail_msg: Every audit_critical_systemd_units item must be a non-empty systemd unit name.
  loop: '{{ audit_critical_systemd_units }}'

- name: Validate audit inactive systemd units
  ansible.builtin.assert:
    that:
      - item | string | trim | length > 0
    fail_msg: Every audit_inactive_systemd_units item must be a non-empty systemd unit name.
  loop: '{{ audit_inactive_systemd_units }}'

- name: Validate audit running systemd unit file states
  ansible.builtin.assert:
    that:
      - item | string | trim | length > 0
    fail_msg: Every audit_running_systemd_unit_file_states item must be a non-empty systemd unit file state.
  loop: '{{ audit_running_systemd_unit_file_states }}'
