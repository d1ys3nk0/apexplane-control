---

audit_ssh_port: 22
audit_ssh_users: []
audit_admin_users: []
audit_service_users: []
audit_disk_threshold: 90
audit_critical_systemd_units:
  - fail2ban
  - auditd
  - unattended-upgrades
  - docker
audit_inactive_systemd_units: []
audit_running_systemd_unit_file_states:
  - enabled
  - enabled-runtime
audit_systemd_log_since_journal: 5 minutes ago
audit_log_error_regex: '(?i)\b(fatal|panic|critical|crit|error|exception|traceback)\b'
audit_log_ignore_regex: '(?i)\b(no errors?|0 errors?|without errors?|error=0)\b|level=(debug|info|warn|warning)|failed to validate image signature.*\x65xp\x65ct\x65d image index descriptor'
audit_log_match_limit: 20
audit_cron_enabled: true
audit_cron_hour: '4'
audit_cron_minute: '0'
audit_cron_log_path: /var/log/audit-host-issues.log

audit_sysctl_params:
  - name: net.ipv4.conf.all.rp_filter
    value: '2'

  - name: net.ipv4.conf.default.rp_filter
    value: '2'

  - name: net.ipv4.conf.all.accept_redirects
    value: '0'

  - name: net.ipv4.conf.default.accept_redirects
    value: '0'

  - name: net.ipv4.conf.all.send_redirects
    value: '0'

  - name: net.ipv4.conf.default.send_redirects
    value: '0'

  - name: net.ipv4.icmp_echo_ignore_broadcasts
    value: '1'

  - name: net.ipv4.icmp_ignore_bogus_error_responses
    value: '1'

  - name: net.ipv4.tcp_syncookies
    value: '1'

  - name: kernel.randomize_va_space
    value: '2'
