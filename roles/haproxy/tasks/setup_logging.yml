---

- name: Ensure HAProxy log directory exists
  become: true
  ansible.builtin.file:
    path: '{{ haproxy_log_dir }}'
    state: directory
    mode: '0755'
    owner: '{{ haproxy_rsyslog_user }}'
    group: '{{ haproxy_rsyslog_group }}'

- name: Deploy HAProxy rsyslog configuration
  become: true
  ansible.builtin.template:
    src: rsyslog/haproxy.conf.j2
    dest: /etc/rsyslog.d/49-haproxy.conf
    mode: '0644'
    owner: root
    group: root
    backup: true
  register: haproxy_rsyslog_config_update

- name: Verify rsyslog configuration (full config including includes)
  become: true
  ansible.builtin.command:
    cmd: rsyslogd -N1
  changed_when: false

- name: Restart rsyslog after HAProxy logging configuration changes
  become: true
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
  when:
    - haproxy_rsyslog_config_update.changed
    - not ansible_check_mode

- name: Verify rsyslog service is active after restart
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - rsyslog
  register: haproxy_rsyslog_restart_service_health
  changed_when: false
  when:
    - haproxy_rsyslog_config_update.changed
    - not ansible_check_mode

- name: Deploy HAProxy logrotate configuration
  become: true
  ansible.builtin.template:
    src: logrotate/haproxy.j2
    dest: /etc/logrotate.d/haproxy
    mode: '0644'
    owner: root
    group: root
