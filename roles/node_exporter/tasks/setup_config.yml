---

- name: Create textfile collector directory
  become: true
  ansible.builtin.file:
    path: '{{ node_exporter_textfile_dir }}'
    state: directory
    owner: '{{ node_exporter_system_user }}'
    group: '{{ node_exporter_system_group }}'
    mode: '0775'

- name: Create node_exporter service file
  become: true
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  register: node_exporter_update_service

- name: Ensure node_exporter is restarted
  become: true
  ansible.builtin.systemd:
    name: node_exporter.service
    daemon_reload: true
    state: restarted
  when: node_exporter_install_binary.changed or node_exporter_update_service.changed

- name: Verify node_exporter service is active after restart
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - node_exporter.service
  register: node_exporter_restart_service_health
  changed_when: false
  when: node_exporter_install_binary.changed or node_exporter_update_service.changed

- name: Ensure node_exporter is enabled and started
  become: true
  ansible.builtin.systemd:
    name: node_exporter.service
    enabled: true
    state: started

- name: Verify node_exporter service is active
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - node_exporter.service
  register: node_exporter_service_health
  changed_when: false

- name: Verify that node_exporter URL is responding
  ansible.builtin.uri:
    url: http://127.0.0.1:{{ node_exporter_verify_port }}{{ node_exporter_web_telemetry_path }}
    method: GET
  register: node_exporter_verify_url_status_code
  until: node_exporter_verify_url_status_code.status == 200
  retries: 10
  delay: 3
