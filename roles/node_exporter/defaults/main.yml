---

node_exporter_version: ~
node_exporter_download_base_url: https://github.com/prometheus/node_exporter/releases/download
node_exporter_arch_map:
  aarch64: arm64
  x86_64: amd64
node_exporter_arch: '{{ node_exporter_arch_map.get(ansible_architecture, ansible_architecture) }}'
node_exporter_archive_name: node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}
node_exporter_archive_path: /var/cache/{{ node_exporter_archive_name }}.tar.gz
node_exporter_archive_checksum: sha256:{{ node_exporter_download_base_url }}/v{{ node_exporter_version }}/sha256sums.txt
node_exporter_extract_path: /var/cache/{{ node_exporter_archive_name }}
node_exporter_binary_install_dir: /usr/local/bin
node_exporter_system_group: node-exp
node_exporter_system_user: '{{ node_exporter_system_group }}'
node_exporter_textfile_dir: /var/lib/node_exporter
node_exporter_web_listen_address: 0.0.0.0:9100
node_exporter_web_telemetry_path: /metrics
node_exporter_verify_port: "{{ node_exporter_web_listen_address | regex_replace('^.*:', '') }}"
