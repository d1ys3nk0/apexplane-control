---

- name: Assert HAProxy required scalar variables are set
  ansible.builtin.assert:
    that:
      - haproxy_alb_self_signed_cert_domain is not none
      - haproxy_alb_self_signed_cert_domain | string | length > 0
      - haproxy_alb_crowdsec_spoa_port | string | length > 0
      - haproxy_alb_stats_port | string | length > 0
      - haproxy_alb_prometheus_exporter_port | string | length > 0
      - haproxy_alb_tunnel_timeout | string | trim is match('^[1-9][0-9]*(us|ms|s|m|h|d)$')
      - haproxy_alb_acme_enabled | type_debug == 'bool'
      - haproxy_alb_acme_port | string | length > 0
      - haproxy_alb_default_target_port | string | length > 0
    fail_msg: Define required haproxy_alb_* scalar variables before running role haproxy_alb.
  no_log: '{{ haproxy_alb_nolog }}'

- name: Assert HAProxy ALB mode variables are valid
  ansible.builtin.assert:
    that:
      - haproxy_alb_interactive_mode | type_debug == 'bool'
    fail_msg: Define HAProxy ALB mode variables with valid types before running role haproxy_alb.

- name: Assert haproxy_alb_target_groups is a mapping
  ansible.builtin.assert:
    that:
      - haproxy_alb_target_groups is defined
      - haproxy_alb_target_groups is mapping
      - haproxy_alb_target_groups.keys() | select('match', '.*-.*') | list | length == 0
      - >-
        haproxy_alb_default_target_group is not defined
        or haproxy_alb_default_target_group is none
        or haproxy_alb_default_target_group | string | length == 0
        or haproxy_alb_default_target_group in haproxy_alb_target_groups
      - >-
        (haproxy_alb_default_target_group | default('', true) | string | length == 0)
        or (haproxy_alb_default_target_host | default('', true) | string | length == 0)
    fail_msg: >-
      haproxy_alb_target_groups must be a mapping of underscore-separated group name to host dict, include configured
      haproxy_alb_default_target_group={{ haproxy_alb_default_target_group | default('UNDEFINED') }}, and not set both
      haproxy_alb_default_target_group and haproxy_alb_default_target_host.

- name: Derive HAProxy route backend fragment group list
  ansible.builtin.set_fact:
    haproxy_alb_route_backend_groups: '{{ haproxy_alb_target_groups.keys() | list | sort }}'

- name: Assert haproxy_alb_target_groups keys do not collide with pseudo backend groups
  ansible.builtin.assert:
    that:
      - ('local' not in haproxy_alb_target_groups) and ('system' not in haproxy_alb_target_groups)
    fail_msg: haproxy_alb_target_groups must not define reserved pseudo group names local or system

- name: Assert haproxy_alb_routes is a non-empty list
  ansible.builtin.assert:
    that:
      - haproxy_alb_routes is defined
      - haproxy_alb_routes is iterable
      - haproxy_alb_routes is not string
      - haproxy_alb_routes | length > 0
    fail_msg: haproxy_alb_routes must be a non-empty list of route dicts

- name: Assert haproxy_alb_throttles is a list
  ansible.builtin.assert:
    that:
      - haproxy_alb_throttles is defined
      - haproxy_alb_throttles is iterable
      - haproxy_alb_throttles is not string
    fail_msg: haproxy_alb_throttles must be a list of throttle rule dicts

- name: Assert HAProxy ALB throttle defaults are valid
  ansible.builtin.assert:
    that:
      - haproxy_alb_throttle_table_size | string | trim is match('^[1-9][0-9]*[kKmMgG]?$')
      - haproxy_alb_throttle_deny_status | int >= 400
      - haproxy_alb_throttle_deny_status | int <= 599
    fail_msg: haproxy_alb_throttle_table_size must be a HAProxy table size and haproxy_alb_throttle_deny_status must be an HTTP 4xx or 5xx status code

- name: Assert haproxy_alb_whitelists is a mapping
  ansible.builtin.assert:
    that:
      - haproxy_alb_whitelists is defined
      - haproxy_alb_whitelists is mapping
    fail_msg: haproxy_alb_whitelists must be a mapping of list name to controller-side source path

- name: Assert haproxy_alb_whitelists entries are valid
  ansible.builtin.assert:
    that:
      - >-
        haproxy_alb_whitelists.keys()
        | select('match', '^[A-Za-z0-9][A-Za-z0-9_-]*$')
        | list
        | length == (haproxy_alb_whitelists | length)
    fail_msg: haproxy_alb_whitelists must use safe names and non-empty controller-side source paths

- name: Assert haproxy_alb_whitelists source paths are strings
  ansible.builtin.assert:
    that:
      - item.value is string
      - item.value | trim | length > 0
    fail_msg: HAProxy ALB whitelist '{{ item.key }}' must define a non-empty controller-side source path
  loop: '{{ haproxy_alb_whitelists | dict2items | sort(attribute="key") }}'
  loop_control:
    label: '{{ item.key }}'

- name: Assert haproxy_alb_whitelists_enforced is a valid list
  ansible.builtin.assert:
    that:
      - haproxy_alb_whitelists_enforced is defined
      - haproxy_alb_whitelists_enforced is iterable
      - haproxy_alb_whitelists_enforced is not string
      - haproxy_alb_whitelists_enforced | unique | length == haproxy_alb_whitelists_enforced | length
      - >-
        haproxy_alb_whitelists_enforced
        | select('match', '^[A-Za-z0-9][A-Za-z0-9_-]*$')
        | list
        | length == (haproxy_alb_whitelists_enforced | length)
      - haproxy_alb_whitelists_enforced | difference(haproxy_alb_whitelists.keys() | list) | length == 0
    fail_msg: haproxy_alb_whitelists_enforced must be a list of names present in haproxy_alb_whitelists

- name: Assert haproxy_alb_trusted_proxy_cidrs is a list
  ansible.builtin.assert:
    that:
      - haproxy_alb_trusted_proxy_cidrs is defined
      - haproxy_alb_trusted_proxy_cidrs is iterable
      - haproxy_alb_trusted_proxy_cidrs is not string
    fail_msg: haproxy_alb_trusted_proxy_cidrs must be a list of IPv4 CIDR strings

- name: Assert haproxy_alb_trusted_proxy_cidrs values are IPv4 CIDRs
  ansible.builtin.assert:
    that:
      - >-
        haproxy_alb_trusted_proxy_cidrs
        | map('string')
        | map('trim')
        | select('match', '^((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})[.]){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(3[0-2]|[12]?[0-9])$')
        | list
        | length == (haproxy_alb_trusted_proxy_cidrs | length)
    fail_msg: haproxy_alb_trusted_proxy_cidrs must contain only IPv4 CIDR strings

- name: Assert haproxy_alb_userlists is a mapping
  ansible.builtin.assert:
    that:
      - haproxy_alb_userlists is defined
      - haproxy_alb_userlists is mapping
    fail_msg: haproxy_alb_userlists must be a mapping
  no_log: '{{ haproxy_alb_nolog }}'

- name: Assert each route has required fields
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | trim is match('^[A-Za-z0-9][A-Za-z0-9_-]*$')
      - item.domain is defined
      - >-
        item.domain is string
        or (item.domain is iterable and item.domain is not string and item.domain is not mapping and item.domain | length > 0)
      - >-
        (item.domain is string and item.domain | trim | length > 0)
        or (
          item.domain is iterable
          and item.domain is not string
          and item.domain is not mapping
          and item.domain | map('string') | map('trim') | select | list | length == item.domain | length
          and item.domain | map('string') | map('trim') | unique | list | length == item.domain | length
        )
      - item.target_port is defined
      - item.target_port | string | length > 0
      - (item.proto | default('https')) in ['https', 'both']
      - item.force_https is not defined or item.force_https is boolean
      - (item.backend_proto | default('http')) in ['http', 'h2']
      - (item.target_group | default('') | string | length > 0) or (item.target_host | default('') | string | length > 0)
      - not ((item.target_group | default('') | string | length > 0) and (item.target_host | default('') | string | length > 0))
      - (item.target_group | default('') | string | length == 0) or (item.target_group in haproxy_alb_target_groups)
    fail_msg: >-
      Invalid route {{ item }}: need safe name, domain as a string or non-empty unique string list, target_port,
      proto in [https, both], optional force_https bool, backend_proto in [http, h2], and exactly one of target_group
      (must exist in haproxy_alb_target_groups) or target_host.
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name | default("?") }}'

- name: Assert route names are unique
  ansible.builtin.assert:
    that:
      - haproxy_alb_routes | map(attribute='name') | list | unique | length == haproxy_alb_routes | length
    fail_msg: haproxy_alb_routes contains duplicate name values

- name: Assert optional route prefix is valid when set
  ansible.builtin.assert:
    that:
      - >-
        item.prefix is not defined
        or item.prefix is none
        or (
          item.prefix is string
          and (item.prefix | trim | length) > 0
          and (item.prefix | trim) is match('^/')
        )
        or (
          item.prefix is iterable
          and item.prefix is not string
          and item.prefix | length > 0
          and item.prefix | map('string') | map('trim') | select('match', '^/') | list | length == item.prefix | length
        )
    fail_msg: 'Route {{ item.name }}: prefix must be a non-empty path or non-empty path list starting with / when set'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'

- name: Assert removed HAProxy ALB route access fields are not set
  ansible.builtin.assert:
    that:
      - item.prefix_whitelist is not defined
      - item.frame_parent_whitelist is not defined
      - item.headers is not defined
      - item.allowed_cidrs is not defined
      - item.cidr_whitelist is not defined
    fail_msg: >-
      Route {{ item.name }} uses removed access fields; use restricted_skip_prefixes, userlist_skip_prefixes,
      userlist_skip_headers, userlist_skip_origins, restricted_cidrs, and userlist on haproxy_alb_routes.
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'

- name: Assert route access modes are mutually exclusive
  ansible.builtin.assert:
    that:
      - >-
        (
          item.restricted_cidrs is not defined
          and item.restricted_skip_prefixes is not defined
        )
        or (
          item.userlist is not defined
          and item.userlist_skip_cidrs is not defined
          and item.userlist_skip_prefixes is not defined
          and item.userlist_skip_headers is not defined
          and item.userlist_skip_origins is not defined
        )
    fail_msg: 'Route {{ item.name }}: restricted_* and userlist* fields are mutually exclusive; split the policy into separate routes'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'

- name: Assert route restricted CIDRs are valid when set
  ansible.builtin.assert:
    that:
      - item.restricted_cidrs is iterable
      - item.restricted_cidrs is not string
      - item.restricted_cidrs | length > 0
      - >-
        item.restricted_cidrs
        | map('string')
        | map('trim')
        | select('match', '^((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})[.]){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(3[0-2]|[12]?[0-9])$')
        | list
        | length == item.restricted_cidrs | length
    fail_msg: 'Route {{ item.name }}: restricted_cidrs must be a non-empty list of IPv4 CIDR strings when set'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.restricted_cidrs is defined

- name: Assert route restricted skip prefixes are valid when set
  ansible.builtin.assert:
    that:
      - item.restricted_cidrs is defined
      - item.restricted_skip_prefixes is iterable
      - item.restricted_skip_prefixes is not string
      - item.restricted_skip_prefixes | length > 0
      - >-
        item.restricted_skip_prefixes
        | map('string')
        | map('trim')
        | select('match', '^/')
        | list
        | length == item.restricted_skip_prefixes | length
    fail_msg: 'Route {{ item.name }}: restricted_skip_prefixes must be set only with restricted_cidrs and contain non-empty paths starting with /'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.restricted_skip_prefixes is defined

- name: Assert route userlist is valid when set
  ansible.builtin.assert:
    that:
      - item.userlist | string | trim | length > 0
      - item.userlist in haproxy_alb_userlists
    fail_msg: 'Route {{ item.name }}: userlist must reference a key in haproxy_alb_userlists'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  no_log: '{{ haproxy_alb_nolog }}'
  when: item.userlist is defined

- name: Assert route userlist skip fields require userlist
  ansible.builtin.assert:
    that:
      - item.userlist is defined
    fail_msg: 'Route {{ item.name }}: userlist_skip_* fields require userlist'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: >-
    item.userlist_skip_cidrs is defined
    or item.userlist_skip_prefixes is defined
    or item.userlist_skip_headers is defined
    or item.userlist_skip_origins is defined

- name: Assert route userlist skip CIDRs are valid when set
  ansible.builtin.assert:
    that:
      - item.userlist_skip_cidrs is iterable
      - item.userlist_skip_cidrs is not string
      - item.userlist_skip_cidrs | length > 0
      - >-
        item.userlist_skip_cidrs
        | map('string')
        | map('trim')
        | select('match', '^((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})[.]){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(3[0-2]|[12]?[0-9])$')
        | list
        | length == item.userlist_skip_cidrs | length
    fail_msg: 'Route {{ item.name }}: userlist_skip_cidrs must be a non-empty list of IPv4 CIDR strings when set'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.userlist_skip_cidrs is defined

- name: Assert route userlist skip prefixes are valid when set
  ansible.builtin.assert:
    that:
      - item.userlist_skip_prefixes is iterable
      - item.userlist_skip_prefixes is not string
      - item.userlist_skip_prefixes | length > 0
      - >-
        item.userlist_skip_prefixes
        | map('string')
        | map('trim')
        | select('match', '^/')
        | list
        | length == item.userlist_skip_prefixes | length
    fail_msg: 'Route {{ item.name }}: userlist_skip_prefixes must be a non-empty list of paths starting with / when set'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.userlist_skip_prefixes is defined

- name: Assert route userlist skip headers are valid when set
  ansible.builtin.assert:
    that:
      - item.userlist_skip_headers is mapping
      - item.userlist_skip_headers | length > 0
      - item.userlist_skip_headers | dictsort | map(attribute=0) | select | list | length == item.userlist_skip_headers | length
      - item.userlist_skip_headers | dictsort | map(attribute=1) | map('string') | select | list | length == item.userlist_skip_headers | length
    fail_msg: 'Route {{ item.name }}: userlist_skip_headers must be a non-empty mapping with non-empty string keys and values'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  no_log: '{{ haproxy_alb_nolog }}'
  when: item.userlist_skip_headers is defined

- name: Assert route userlist skip origins are valid when set
  ansible.builtin.assert:
    that:
      - item.userlist_skip_origins is iterable
      - item.userlist_skip_origins is not string
      - item.userlist_skip_origins | length > 0
      - >-
        item.userlist_skip_origins
        | map('string')
        | map('trim')
        | select('match', '^https://([*][.])?[A-Za-z0-9][A-Za-z0-9.-]*[A-Za-z0-9]$')
        | list
        | length == (item.userlist_skip_origins | length)
      - >-
        item.userlist_skip_origins
        | map('string')
        | map('trim')
        | unique
        | list
        | length == (item.userlist_skip_origins | length)
    fail_msg: 'Route {{ item.name }}: userlist_skip_origins must be a non-empty list of unique HTTPS origins'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.userlist_skip_origins is defined

- name: Assert route (domain, prefix) pairs are unique
  ansible.builtin.assert:
    that:
      - haproxy_alb_route_domain_prefix_keys | length == haproxy_alb_route_domain_prefix_keys | unique | length
    fail_msg: haproxy_alb_routes contains duplicate (domain, prefix) combinations

- name: Assert route response header deletes are valid when set
  ansible.builtin.assert:
    that:
      - item.response_header_deletes is iterable
      - item.response_header_deletes is not string
      - item.response_header_deletes | length > 0
      - item.response_header_deletes | map('string') | map('trim') | unique | list | length == item.response_header_deletes | length
      - >-
        item.response_header_deletes
        | map('string')
        | map('trim')
        | select('match', "^[!#$%&'*+.^_`|~0-9A-Za-z-]+$")
        | list
        | length == item.response_header_deletes | length
    fail_msg: 'Route {{ item.name }}: response_header_deletes must be a non-empty unique list of HTTP header names'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.response_header_deletes is defined

- name: Assert route response headers are valid when set
  ansible.builtin.assert:
    that:
      - item.response_headers is mapping
      - item.response_headers | length > 0
      - >-
        item.response_headers
        | dict2items
        | map(attribute='key')
        | map('string')
        | map('trim')
        | select('match', "^[!#$%&'*+.^_`|~0-9A-Za-z-]+$")
        | list
        | length == item.response_headers | length
      - >-
        item.response_headers
        | dict2items
        | map(attribute='value')
        | map('string')
        | map('trim')
        | select
        | list
        | length == item.response_headers | length
      - >-
        item.response_headers
        | dict2items
        | map(attribute='value')
        | map('string')
        | select('match', '^[^"]+$')
        | list
        | length == item.response_headers | length
    fail_msg: 'Route {{ item.name }}: response_headers must be a non-empty mapping of HTTP header names to non-empty values without double quotes'
  loop: '{{ haproxy_alb_routes }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.response_headers is defined

- name: Assert each throttle rule has required fields
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | trim is match('^[A-Za-z0-9][A-Za-z0-9_-]*$')
      - item.domain is defined
      - >-
        item.domain is string
        or (item.domain is iterable and item.domain is not string and item.domain is not mapping and item.domain | length > 0)
      - >-
        (item.domain is string and item.domain | trim | length > 0)
        or (
          item.domain is iterable
          and item.domain is not string
          and item.domain is not mapping
          and item.domain | map('string') | map('trim') | select | list | length == item.domain | length
          and item.domain | map('string') | map('trim') | unique | list | length == item.domain | length
        )
      - item.prefix is defined
      - item.prefix | string | trim is match('^/')
      - item.requests is defined
      - item.requests | int > 0
      - item.period is defined
      - item.period | string | trim is match('^[1-9][0-9]*(us|ms|s|m|h|d)$')
      - item.table_size is not defined or item.table_size | string | trim is match('^[1-9][0-9]*[kKmMgG]?$')
    fail_msg: >-
      Invalid throttle rule {{ item }}: need safe name, domain as a string or non-empty unique string list, prefix starting with /,
      requests > 0, period as a HAProxy duration, and optional valid table_size.
  loop: '{{ haproxy_alb_throttles }}'
  loop_control:
    label: '{{ item.name | default("?") }}'

- name: Assert throttle names are unique
  ansible.builtin.assert:
    that:
      - haproxy_alb_throttles | map(attribute='name') | list | unique | length == haproxy_alb_throttles | length
    fail_msg: haproxy_alb_throttles contains duplicate name values

- name: Assert throttle (domain, prefix) pairs are unique
  ansible.builtin.assert:
    that:
      - haproxy_alb_throttle_domain_prefix_keys | length == haproxy_alb_throttle_domain_prefix_keys | unique | length
    fail_msg: haproxy_alb_throttles contains duplicate (domain, prefix) combinations

- name: Assert at least one route requires auth
  ansible.builtin.assert:
    that:
      - haproxy_alb_routes | selectattr('userlist', 'defined') | list | length > 0
    fail_msg: At least one HAProxy ALB route must define userlist
