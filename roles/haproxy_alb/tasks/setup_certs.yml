---

- name: Get HAProxy SSL certificate files
  become: true
  ansible.builtin.find:
    paths: /etc/ssl/haproxy
    patterns: '*.pem'
    file_type: file
  register: haproxy_alb_ssl_cert_files
  when: haproxy_alb_manage_certs | bool

- name: Remove HAProxy SSL certificates unmanaged by haproxy_alb_certs
  become: true
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: absent
  loop: '{{ haproxy_alb_ssl_cert_files.files | default([]) | sort(attribute="path") }}'
  loop_control:
    label: '{{ item.path }}'
  register: haproxy_alb_unmanaged_ssl_cert_cleanup
  when: haproxy_alb_unmanaged_ssl_cert_cleanup_item | bool

- name: Get HAProxy SSL certificate files after cleanup
  become: true
  ansible.builtin.find:
    paths: /etc/ssl/haproxy
    patterns: '*.pem'
    file_type: file
  register: haproxy_alb_ssl_cert_files_after_cleanup
  when: haproxy_alb_manage_certs_now | bool

- name: Assert HAProxy SSL certificate list is correct
  ansible.builtin.assert:
    that:
      - >-
        (
          haproxy_alb_ssl_cert_files_after_cleanup.files
          | map(attribute='path')
          | map('basename')
          | reject('match', '^_')
          | sort
        ) | difference(haproxy_alb_ssl_cert_items | map(attribute='basename') | list) | length == 0
    fail_msg: >-
      /etc/ssl/haproxy contains files unmanaged by haproxy_alb_certs.
      Expected subset of: {{ haproxy_alb_ssl_cert_items | map(attribute='basename') | list | sort }}.
      Found: {{ haproxy_alb_ssl_cert_files_after_cleanup.files | map(attribute='path') | map('basename') | reject('match', '^_') | sort }}.
  when: haproxy_alb_manage_certs_now | bool

- name: Check HAProxy SSL certificate domain coverage
  become: true
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      expected_file=$(mktemp)
      actual_file=$(mktemp)
      trap 'rm -f "${expected_file}" "${actual_file}"' EXIT

      {% for _domain in item.domains %}
      printf '%s\n' {{ _domain | quote }} >>"${expected_file}"
      {% endfor %}
      sort -u -o "${expected_file}" "${expected_file}"

      openssl x509 -in "{{ item.path }}" -noout -ext subjectAltName |
        tr ',' '\n' |
        sed -n 's/.*[Dd][Nn][Ss]://p' |
        sed 's/^[[:space:]]*//' |
        sort -u >"${actual_file}"

      if [ "$(comm -23 "${expected_file}" "${actual_file}" | wc -l)" -eq 0 ]; then
          echo MATCH
      else
          echo MISMATCH
          echo "Expected domains:"
          cat "${expected_file}"
          echo "Actual domains:"
          cat "${actual_file}"
      fi
    executable: /bin/bash
  register: haproxy_alb_ssl_cert_domain_checks
  changed_when: false
  failed_when: false
  loop: '{{ haproxy_alb_installed_ssl_cert_items | default([]) }}'
  loop_control:
    label: '{{ item.path }}'
  when: haproxy_alb_manage_certs_now | bool

- name: Assert HAProxy SSL certificate domain coverage is correct
  ansible.builtin.assert:
    that:
      - haproxy_alb_ssl_cert_domain_checks.results | map(attribute='stdout') | map('trim') | list | difference(['MATCH']) | length == 0
    fail_msg: >-
      Every installed HAProxy SSL certificate managed by haproxy_alb_certs must cover its configured domains.
      Results: {{ haproxy_alb_ssl_cert_domain_checks.results | map(attribute='stdout_lines') | list }}.
  when:
    - haproxy_alb_manage_certs_now | bool
    - haproxy_alb_installed_ssl_cert_items | length > 0

- name: Validate HAProxy configs after SSL certificate changes
  become: true
  ansible.builtin.command:
    cmd: haproxy -c -f /etc/haproxy/haproxy.cfg -f /etc/haproxy/conf.d
  register: haproxy_alb_ssl_cert_conf_check
  changed_when: false
  failed_when: false
  when: haproxy_alb_ssl_cert_reload_needed | bool

- name: Assert HAProxy validation output is correct after SSL certificate changes
  ansible.builtin.assert:
    that:
      - haproxy_alb_ssl_cert_conf_check.stdout | trim == "Configuration file is valid"
      - haproxy_alb_ssl_cert_conf_check.stderr | trim == ""
    fail_msg: "HAProxy check returned extra output after SSL certificate changes:\n\nstdout: '{{ haproxy_alb_ssl_cert_conf_check.stdout }}'\n\nstderr: '{{ haproxy_alb_ssl_cert_conf_check.stderr }}'"
    success_msg: HAProxy check returned no extra output after SSL certificate changes
  when: haproxy_alb_ssl_cert_reload_needed | bool

- name: Reload HAProxy after SSL certificate changes
  become: true
  ansible.builtin.systemd:
    name: haproxy
    state: reloaded
  when: haproxy_alb_ssl_cert_reload_needed | bool

- name: Verify HAProxy service is active after SSL certificate reload
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - haproxy
  register: haproxy_alb_ssl_cert_reload_service_health
  changed_when: false
  when: haproxy_alb_ssl_cert_reload_needed | bool

- name: Check HAProxy SSL certificate expiry
  become: true
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -in
      - '{{ item.path }}'
      - -noout
      - -subject
      - -issuer
      - -enddate
      - -checkend
      - '2592000'
  loop: '{{ haproxy_alb_installed_ssl_cert_items | default([]) }}'
  loop_control:
    label: '{{ item.path }}'
  register: haproxy_alb_ssl_cert_expiry_checks
  changed_when: false
  failed_when: false
  when: haproxy_alb_manage_certs_now | bool

- name: Print HAProxy SSL certificate expiry
  ansible.builtin.debug:
    msg: '{{ item.stdout_lines }}'
  loop: '{{ haproxy_alb_ssl_cert_expiry_checks.results | default([]) }}'
  loop_control:
    label: '{{ item.item }}'
  when: haproxy_alb_manage_certs_now | bool

- name: Assert HAProxy SSL certificates expire in more than 30 days
  ansible.builtin.assert:
    that:
      - haproxy_alb_ssl_cert_expiry_checks.results | map(attribute='rc') | max == 0
    fail_msg: "Every installed HAProxy SSL certificate managed by haproxy_alb_certs must expire in more than 30 days. Results: {{ haproxy_alb_ssl_cert_expiry_checks.results | map(attribute='stdout_lines') | list }}"
  when:
    - haproxy_alb_manage_certs_now | bool
    - haproxy_alb_installed_ssl_cert_items | length > 0
