---

haproxy_alb_ci_mode: "{{ lookup('env', 'CI') | default('0', true) in ['1', 'true'] }}"
haproxy_alb_debug_mode: "{{ lookup('env', 'DEBUG') | default('0', true) in ['1', 'true'] }}"
haproxy_alb_nolog: '{{ (haproxy_alb_ci_mode | bool) and not (haproxy_alb_debug_mode | bool) }}'
haproxy_alb_interactive_mode: "{{ lookup('env', 'INTERACTIVE') | default('1', true) | lower not in ['0', 'false'] }}"
haproxy_alb_manage_certs: '{{ haproxy_alb_certs is defined and haproxy_alb_certs | length > 0 }}'
haproxy_alb_ssl_cert_items: >-
  {%- set _cert_items = [] -%}
  {%- for _cert in haproxy_alb_certs | default({}) | dict2items | sort(attribute='key') -%}
    {%- set _cert_domains = ([_cert.value] if _cert.value is string else _cert.value) | map('string') | sort -%}
    {%- set _cert_domain_arg = _cert_domains | join(',') -%}
    {%- set _cert_hash = _cert_domain_arg | hash('md5') -%}
    {%- set _cert_basename = _cert.key ~ '-' ~ _cert_hash ~ '.pem' -%}
    {%- set _ = _cert_items.append({
      'name': _cert.key,
      'domains': _cert_domains,
      'domain_arg': _cert_domain_arg,
      'hash': _cert_hash,
      'basename': _cert_basename,
      'path': '/etc/ssl/haproxy/' ~ _cert_basename,
    }) -%}
  {%- endfor -%}
  {{ _cert_items }}
haproxy_alb_domain_prefix_key_separator: '::'
haproxy_alb_route_domain_prefix_keys: >-
  {%- set _keys = [] -%}
  {%- for _route in haproxy_alb_routes | default([]) -%}
    {%- set _domains = [_route.domain] if _route.domain is string else _route.domain -%}
    {%- set _prefixes = [''] if _route.prefix is not defined or _route.prefix is none or (_route.prefix is string and _route.prefix | trim | length == 0) else ([_route.prefix | string | trim] if _route.prefix is string else (_route.prefix | map('string') | map('trim') | list)) -%}
    {%- for _key in _domains | product(_prefixes) | map('join', haproxy_alb_domain_prefix_key_separator) | list -%}
      {%- set _ = _keys.append(_key) -%}
    {%- endfor -%}
  {%- endfor -%}
  {{ _keys }}
haproxy_alb_auth_domain_prefix_keys: >-
  {%- set _keys = [] -%}
  {%- for _auth_rule in haproxy_alb_auth | default([]) -%}
    {%- set _domains = [_auth_rule.domain] if _auth_rule.domain is string else _auth_rule.domain -%}
    {%- set _trimmed_prefix = _auth_rule.prefix | default('', true) | string | trim -%}
    {%- for _key in _domains | map('regex_replace', '$', haproxy_alb_domain_prefix_key_separator ~ _trimmed_prefix) | list -%}
      {%- set _ = _keys.append(_key) -%}
    {%- endfor -%}
  {%- endfor -%}
  {{ _keys }}
haproxy_alb_throttle_domain_prefix_keys: >-
  {%- set _keys = [] -%}
  {%- for _throttle in haproxy_alb_throttles | default([]) -%}
    {%- set _domains = [_throttle.domain] if _throttle.domain is string else _throttle.domain -%}
    {%- set _trimmed_prefix = _throttle.prefix | string | trim -%}
    {%- for _key in _domains | map('regex_replace', '$', haproxy_alb_domain_prefix_key_separator ~ _trimmed_prefix) | list -%}
      {%- set _ = _keys.append(_key) -%}
    {%- endfor -%}
  {%- endfor -%}
  {{ _keys }}
haproxy_alb_not_check_mode: '{{ not ansible_check_mode }}'
haproxy_alb_docker_configured: "{{ 'docker.service' in (ansible_facts.services | default({})) }}"
haproxy_alb_docker_available: "{{ haproxy_alb_docker_configured | bool and (ansible_facts.services.get('docker.service', {}).state | default('')) == 'running' }}"
haproxy_alb_manage_certs_now: '{{ haproxy_alb_manage_certs | bool and haproxy_alb_not_check_mode | bool }}'
haproxy_alb_crowdsec_disabled: '{{ not (haproxy_alb_crowdsec_enabled | bool) }}'
haproxy_alb_noninteractive_mode: '{{ not (haproxy_alb_interactive_mode | bool) }}'
haproxy_alb_config_changed: >-
  {{
    haproxy_alb_config_main_update.changed
    or haproxy_alb_fe_web_update.changed
    or haproxy_alb_be_group_update.changed
    or haproxy_alb_be_local_update.changed
    or haproxy_alb_be_system_update.changed
    or haproxy_alb_backend_fragment_cleanup.changed
    or (haproxy_alb_whitelist_upload is defined and haproxy_alb_whitelist_upload.changed)
    or (haproxy_alb_be_throttle_update is defined and haproxy_alb_be_throttle_update.changed)
    or (haproxy_alb_config_crowdsec_update is defined and haproxy_alb_config_crowdsec_update.changed)
    or (haproxy_alb_config_crowdsec_remove is defined and haproxy_alb_config_crowdsec_remove.changed)
  }}
haproxy_alb_unmanaged_ssl_cert_cleanup_item: "{{ haproxy_alb_manage_certs | bool and (item.path | basename | regex_search('^_')) is none and (item.path | basename) not in (haproxy_alb_ssl_cert_items | map(attribute='basename') | list) }}"
haproxy_alb_ssl_cert_changed: '{{ haproxy_alb_unmanaged_ssl_cert_cleanup is defined and haproxy_alb_unmanaged_ssl_cert_cleanup is changed }}'
haproxy_alb_ssl_cert_changed_now: '{{ haproxy_alb_ssl_cert_changed | bool and haproxy_alb_not_check_mode | bool }}'
haproxy_alb_ssl_cert_reload_needed: '{{ haproxy_alb_ssl_cert_changed_now | bool }}'
haproxy_alb_installed_ssl_cert_basenames: "{{ haproxy_alb_ssl_cert_files_after_cleanup.files | default([]) | map(attribute='path') | map('basename') | list }}"
haproxy_alb_installed_ssl_cert_items: "{{ haproxy_alb_ssl_cert_items | selectattr('basename', 'in', haproxy_alb_installed_ssl_cert_basenames) | list }}"
