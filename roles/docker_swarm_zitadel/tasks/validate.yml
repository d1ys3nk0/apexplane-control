---

- name: Assert Docker Swarm Zitadel enabled flag is valid
  ansible.builtin.assert:
    that:
      - docker_swarm_zitadel_enabled is boolean
    fail_msg: docker_swarm_zitadel_enabled must be boolean.

- name: Validate Docker Swarm Zitadel command variables
  ansible.builtin.assert:
    that:
      - docker_swarm_zitadel_command | string in ['', 'start', 'start-from-setup', 'start-from-init']
      - docker_swarm_zitadel_init_org_human_password_change_required is boolean
    fail_msg: Define a valid Docker Swarm Zitadel command and first-instance password-change flag.
  no_log: '{{ docker_swarm_zitadel_nolog }}'

- name: Assert Docker Swarm Zitadel required variables are set
  ansible.builtin.assert:
    that:
      - docker_swarm_zitadel_service_name | string | length > 0
      - docker_swarm_zitadel_domain is not none
      - docker_swarm_zitadel_domain | string | length > 0
      - docker_swarm_zitadel_http_listen_port | int > 0
      - docker_swarm_zitadel_http_public_port | int > 0
      - docker_swarm_zitadel_image_full | string | length > 0
      - docker_swarm_zitadel_masterkey is not none
      - docker_swarm_zitadel_masterkey | string | length > 0
      - docker_swarm_zitadel_pg_base is not none
      - docker_swarm_zitadel_pg_base | string | length > 0
      - docker_swarm_zitadel_pg_host is not none
      - docker_swarm_zitadel_pg_host | string | length > 0
      - docker_swarm_zitadel_pg_pass is not none
      - docker_swarm_zitadel_pg_pass | string | length > 0
      - docker_swarm_zitadel_pg_port | int > 0
      - docker_swarm_zitadel_pg_ssl | string | length > 0
      - docker_swarm_zitadel_pg_user is not none
      - docker_swarm_zitadel_pg_user | string | length > 0
      - docker_swarm_zitadel_pg_image | string | length > 0
      - docker_swarm_zitadel_pg_backup_concurrency | string is match('^[1-9][0-9]*$')
      - >-
        docker_swarm_zitadel_pg_recover_concurrency | string | length == 0
        or docker_swarm_zitadel_pg_recover_concurrency | string is match('^[1-9][0-9]*$')
      - docker_swarm_zitadel_pg_recover_exclude_extensions is string
      - docker_swarm_zitadel_pg_recover_no_prepare is boolean
      - docker_swarm_zitadel_pg_recover_no_recreate is boolean
    fail_msg: Define Docker Swarm Zitadel service, domain, master key, and PostgreSQL variables.
  no_log: '{{ docker_swarm_zitadel_nolog }}'
  when: docker_swarm_zitadel_enabled | bool

- name: Validate Docker Swarm Zitadel first-instance org variables
  ansible.builtin.assert:
    that:
      - docker_swarm_zitadel_init_org_requested | bool == docker_swarm_zitadel_init_org_enabled | bool
    fail_msg: Define Zitadel first-instance org name, human username, and human password together.
  no_log: '{{ docker_swarm_zitadel_nolog }}'
  when: docker_swarm_zitadel_enabled | bool

- name: Validate Docker Swarm Zitadel PostgreSQL backup S3 variables
  ansible.builtin.assert:
    that:
      - docker_swarm_zitadel_pg_backup_s3_bucket | string | length > 0
      - docker_swarm_zitadel_pg_backup_s3_endpoint | string | length > 0
      - docker_swarm_zitadel_pg_backup_s3_region | string | length > 0
    fail_msg: Define Docker Swarm Zitadel PostgreSQL backup S3 bucket, endpoint, and region when backup S3 keys are set.
  when:
    - docker_swarm_zitadel_enabled | bool
    - docker_swarm_zitadel_pg_backup_s3_enabled | bool

- name: Validate Docker Swarm Zitadel PostgreSQL recovery S3 variables
  ansible.builtin.assert:
    that:
      - docker_swarm_zitadel_pg_recover_s3_bucket | string | length > 0
      - docker_swarm_zitadel_pg_recover_s3_endpoint | string | length > 0
      - docker_swarm_zitadel_pg_recover_s3_region | string | length > 0
    fail_msg: Define Docker Swarm Zitadel PostgreSQL recovery S3 bucket, endpoint, and region when recovery S3 keys are set.
  when:
    - docker_swarm_zitadel_enabled | bool
    - docker_swarm_zitadel_pg_recover_s3_enabled | bool
