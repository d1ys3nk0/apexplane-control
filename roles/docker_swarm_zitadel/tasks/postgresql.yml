---

- name: Create Zitadel PostgreSQL env directory
  become: true
  ansible.builtin.file:
    path: /opt/zitadel/postgres
    state: directory
    mode: '0750'
    owner: root
    group: root

- name: Create Zitadel PostgreSQL client env file
  become: true
  ansible.builtin.template:
    src: pg.env.j2
    dest: /opt/zitadel/postgres/{{ docker_swarm_zitadel_pg_base }}.env
    mode: '0600'
    owner: root
    group: root
    no_log: '{{ docker_swarm_zitadel_nolog }}'

- name: Create Zitadel user
  community.postgresql.postgresql_user:
    name: '{{ docker_swarm_zitadel_pg_user }}'
    password: '{{ docker_swarm_zitadel_pg_pass }}'
    role_attr_flags: SUPERUSER
    login_host: '{{ docker_swarm_zitadel_pg_host }}'
    login_port: '{{ docker_swarm_zitadel_pg_port }}'
    ssl_mode: '{{ docker_swarm_zitadel_pg_ssl }}'
    login_user: '{{ docker_swarm_zitadel_pg_admin_user }}'
    login_password: '{{ docker_swarm_zitadel_pg_admin_pass }}'
  no_log: '{{ docker_swarm_zitadel_nolog }}'
  when: docker_swarm_zitadel_pg_provision_enabled | bool

- name: Create Zitadel database
  community.postgresql.postgresql_db:
    name: '{{ docker_swarm_zitadel_pg_base }}'
    owner: '{{ docker_swarm_zitadel_pg_user }}'
    encoding: UTF-8
    template: template0
    login_host: '{{ docker_swarm_zitadel_pg_host }}'
    login_port: '{{ docker_swarm_zitadel_pg_port }}'
    ssl_mode: '{{ docker_swarm_zitadel_pg_ssl }}'
    login_user: '{{ docker_swarm_zitadel_pg_admin_user }}'
    login_password: '{{ docker_swarm_zitadel_pg_admin_pass }}'
  no_log: '{{ docker_swarm_zitadel_nolog }}'
  when: docker_swarm_zitadel_pg_provision_enabled | bool
