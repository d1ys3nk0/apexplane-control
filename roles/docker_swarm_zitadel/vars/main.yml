---

docker_swarm_zitadel_ci_mode: "{{ lookup('env', 'CI') | default('0', true) in ['1', 'true'] }}"
docker_swarm_zitadel_debug_mode: "{{ lookup('env', 'DEBUG') | default('0', true) in ['1', 'true'] }}"
docker_swarm_zitadel_nolog: '{{ (docker_swarm_zitadel_ci_mode | bool) and not (docker_swarm_zitadel_debug_mode | bool) }}'
docker_swarm_zitadel_init_org_enabled: >-
  {{
    docker_swarm_zitadel_init_org_name | string | length > 0
    and docker_swarm_zitadel_init_org_human_username | string | length > 0
    and docker_swarm_zitadel_init_org_human_password | string | length > 0
  }}
docker_swarm_zitadel_init_org_requested: >-
  {{
    docker_swarm_zitadel_init_org_name | string | length > 0
    or docker_swarm_zitadel_init_org_human_username | string | length > 0
    or docker_swarm_zitadel_init_org_human_password | string | length > 0
  }}
docker_swarm_zitadel_run_command: "{{ docker_swarm_zitadel_command | default('', true) if docker_swarm_zitadel_command | string | length > 0 else ('start-from-init' if docker_swarm_zitadel_init_org_enabled | bool else 'start') }}"
docker_swarm_zitadel_base_env:
  ZITADEL_LOG_LEVEL: info
  ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: 'true'
  ZITADEL_TLS_ENABLED: 'false'
  ZITADEL_EXTERNALDOMAIN: '{{ docker_swarm_zitadel_domain }}'
  ZITADEL_EXTERNALPORT: '443'
  ZITADEL_EXTERNALSECURE: 'true'
  ZITADEL_DATABASE_POSTGRES_HOST: '{{ docker_swarm_zitadel_pg_host }}'
  ZITADEL_DATABASE_POSTGRES_PORT: '{{ docker_swarm_zitadel_pg_port | string }}'
  ZITADEL_DATABASE_POSTGRES_DATABASE: '{{ docker_swarm_zitadel_pg_base }}'
  ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: '{{ docker_swarm_zitadel_pg_ssl }}'
  ZITADEL_DATABASE_POSTGRES_USER_USERNAME: '{{ docker_swarm_zitadel_pg_user }}'
  ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: '{{ docker_swarm_zitadel_pg_pass }}'
  ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: '{{ docker_swarm_zitadel_pg_ssl }}'
  ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: '{{ docker_swarm_zitadel_pg_user }}'
  ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: '{{ docker_swarm_zitadel_pg_pass }}'
  ZITADEL_DATABASE_POSTGRES_ADMIN_EXISTINGDATABASE: '{{ docker_swarm_zitadel_pg_base }}'
  ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: 'false'
docker_swarm_zitadel_init_org_env:
  ZITADEL_FIRSTINSTANCE_ORG_NAME: '{{ docker_swarm_zitadel_init_org_name }}'
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: '{{ docker_swarm_zitadel_init_org_human_username }}'
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: '{{ docker_swarm_zitadel_init_org_human_password }}'
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: '{{ docker_swarm_zitadel_init_org_human_password_change_required | string | lower }}'
docker_swarm_zitadel_env: "{{ docker_swarm_zitadel_base_env | combine((docker_swarm_zitadel_init_org_enabled | bool) | ternary(docker_swarm_zitadel_init_org_env, {})) }}"
docker_swarm_zitadel_pg_backup_s3_enabled: "{{ docker_swarm_zitadel_pg_backup_s3_access_key | string | length > 0 and docker_swarm_zitadel_pg_backup_s3_secret_key | string | length > 0 }}"
docker_swarm_zitadel_pg_provision_enabled: >-
  {{
    docker_swarm_zitadel_pg_admin_user | string | length > 0
    and docker_swarm_zitadel_pg_admin_pass | string | length > 0
  }}
docker_swarm_zitadel_pg_recover_s3_enabled: "{{ docker_swarm_zitadel_pg_recover_s3_access_key | string | length > 0 and docker_swarm_zitadel_pg_recover_s3_secret_key | string | length > 0 }}"
