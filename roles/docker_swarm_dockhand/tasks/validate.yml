---

- name: Assert Dockhand enabled flag is valid
  ansible.builtin.assert:
    that:
      - docker_swarm_dockhand_enabled is boolean
      - docker_swarm_dockhand_image_tag is not none
      - docker_swarm_dockhand_image_tag | string | length > 0
    fail_msg: docker_swarm_dockhand_enabled must be boolean.

- name: Assert Dockhand required variables are set
  ansible.builtin.assert:
    that:
      - docker_swarm_dockhand_service_name | string | length > 0
      - docker_swarm_dockhand_image_full | string | length > 0
      - docker_swarm_dockhand_data_dir | string | length > 0
      - docker_swarm_dockhand_data_dir is match('^/')
      - docker_swarm_dockhand_docker_socket | string | length > 0
      - docker_swarm_dockhand_docker_socket is match('^/')
      - docker_swarm_dockhand_user | string | length > 0
      - docker_swarm_dockhand_http_listen_port | int > 0
      - docker_swarm_dockhand_http_expose_port | int > 0
    fail_msg: Define valid Dockhand paths, service name, user, and ports before running role docker_swarm_dockhand.
  when: docker_swarm_dockhand_enabled | bool
