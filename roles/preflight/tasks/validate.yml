---

- name: Assert preflight required variables are set
  ansible.builtin.assert:
    that:
      - preflight_cluster_name is not none
      - preflight_cluster_name | string | length > 0
      - preflight_cluster_realm is not none
      - preflight_cluster_realm | string | length > 0
      - preflight_cluster_platform is not none
      - preflight_cluster_platform | string | length > 0
      - preflight_region is not none
      - preflight_region | string | length > 0
      - preflight_vpc_cidr is not none
      - preflight_vpc_cidr | string | length > 0
      - preflight_zone is not none
      - preflight_zone | string | length > 0
    fail_msg: Define preflight cluster, platform, region, zone, and VPC variables.
