---

- name: Gather recent systemd journal logs
  become: true
  ansible.builtin.command:
    argv:
      - journalctl
      - -u
      - '{{ item }}'
      - --since
      - '{{ assessment_log_since_journal }}'
      - --no-pager
      - -o
      - short-iso
  register: assessment_journal_log_result
  failed_when: assessment_journal_log_result.rc not in [0, 1]
  changed_when: false
  loop: '{{ assessment_journal_units }}'

- name: Assert recent systemd journal logs contain no error patterns
  ansible.builtin.assert:
    that:
      - _assessment_log_matches | length == 0
    fail_msg: |-
      Recent journal logs for {{ item.item }} contain error patterns:
      {{ (_assessment_log_matches[: assessment_log_match_limit | int]) | join('\n') }}
  vars:
    _assessment_log_matches: "{{ item.stdout_lines | select('search', assessment_log_error_regex) | reject('search', assessment_log_ignore_regex) | list }}"
  loop: '{{ assessment_journal_log_result.results | default([]) }}'
  loop_control:
    label: '{{ item.item }}'
