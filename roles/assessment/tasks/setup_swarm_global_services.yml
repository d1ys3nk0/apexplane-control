---

- name: Inspect active Docker Swarm nodes
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - node
      - ls
      - --format
      - "{% raw %}{{.Hostname}}|{{.Availability}}|{{.ManagerStatus}}{% endraw %}"
  register: assessment_swarm_active_nodes
  changed_when: false

- name: Verify Docker Swarm global service modes
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - service
      - inspect
      - --format
      - "{% raw %}{{if .Spec.Mode.Global}}global{{else}}replicated{{end}}{% endraw %}"
      - '{{ item.name if item is mapping else item }}'
  register: assessment_swarm_global_service_modes
  changed_when: false
  failed_when: assessment_swarm_global_service_modes.rc != 0 or assessment_swarm_global_service_modes.stdout != 'global'
  loop: '{{ assessment_swarm_global_services }}'
  loop_control:
    label: '{{ item.name if item is mapping else item }}'

- name: Verify Docker Swarm global services run on expected active nodes
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - service
      - ps
      - --filter
      - desired-state=running
      - --format
      - "{% raw %}{{.Node}} {{.CurrentState}}{% endraw %}"
      - '{{ item.name if item is mapping else item }}'
  register: assessment_swarm_global_service_tasks
  changed_when: false
  failed_when: >-
    assessment_swarm_global_service_tasks.rc != 0
    or (assessment_swarm_expected_node_names | length) == 0
    or (assessment_swarm_global_running_task_nodes | length) != (assessment_swarm_expected_node_names | length)
    or (assessment_swarm_global_running_task_nodes | unique | sort | list)
    != (assessment_swarm_expected_node_names | unique | sort | list)
  vars:
    assessment_swarm_global_node_role: "{{ item.node_role | default('all', true) if item is mapping else 'all' }}"
    assessment_swarm_global_running_task_nodes: >-
      {{
        assessment_swarm_global_service_tasks.stdout_lines
        | select('match', '^[^ ]+ Running')
        | map('regex_replace', '^([^ ]+) .+$', '\\1')
        | list
      }}
    assessment_swarm_expected_node_names: >-
      {{
        assessment_swarm_active_nodes.stdout_lines
        | select('match', assessment_swarm_expected_node_regex)
        | map('regex_replace', '^([^|]+)\\|.+$', '\\1')
        | list
      }}
    assessment_swarm_expected_node_regex: >-
      {{
        {
          'all': '^[^|]+\\|Active\\|.*$',
          'manager': '^[^|]+\\|Active\\|.+$',
          'worker': '^[^|]+\\|Active\\|$',
        }[assessment_swarm_global_node_role]
      }}
  loop: '{{ assessment_swarm_global_services }}'
  loop_control:
    label: '{{ item.name if item is mapping else item }}'
