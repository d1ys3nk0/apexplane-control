---

- name: Validate assessment list inputs
  ansible.builtin.assert:
    that:
      - assessment_systemd_units is iterable
      - assessment_docker_containers is iterable
      - assessment_swarm_services is iterable
      - assessment_swarm_global_services is iterable
      - assessment_swarm_replicated_services is iterable
      - assessment_tcp_ports is iterable
      - assessment_http_endpoints is iterable
      - assessment_commands is iterable
      - assessment_journal_units is iterable
      - assessment_docker_log_containers is iterable
      - assessment_swarm_log_services is iterable
      - assessment_log_match_limit | int > 0
    fail_msg: Assessment inputs must be iterable lists and assessment_log_match_limit must be positive.

- name: Validate Docker Swarm global service check types
  ansible.builtin.assert:
    that:
      - item is string or item is mapping
    fail_msg: Each assessment_swarm_global_services item must be a service name or check mapping.
  loop: '{{ assessment_swarm_global_services }}'

- name: Validate Docker Swarm global service string checks
  ansible.builtin.assert:
    that:
      - item | length > 0
    fail_msg: Each assessment_swarm_global_services item must be a non-empty service name.
  loop: '{{ assessment_swarm_global_services }}'
  when: item is string

- name: Validate Docker Swarm global service mapping checks
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | length > 0
      - item.node_role is not defined or item.node_role in ['all', 'manager', 'worker']
    fail_msg: Each assessment_swarm_global_services mapping must define name and optional node_role all, manager, or worker.
  loop: '{{ assessment_swarm_global_services }}'
  when: item is mapping

- name: Validate Docker Swarm replicated service checks
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined
      - item.name | string | length > 0
      - item.replicas is defined
      - item.replicas | int >= 0
    fail_msg: Each assessment_swarm_replicated_services item must define name and non-negative replicas.
  loop: '{{ assessment_swarm_replicated_services }}'

- name: Validate TCP port checks
  ansible.builtin.assert:
    that:
      - item.port is defined
      - item.port | int > 0
      - item.port | int <= 65535
    fail_msg: Each assessment_tcp_ports item must define a valid port.
  loop: '{{ assessment_tcp_ports }}'

- name: Validate HTTP endpoint checks
  ansible.builtin.assert:
    that:
      - item.url is defined
      - item.url | string | length > 0
    fail_msg: Each assessment_http_endpoints item must define url.
  loop: '{{ assessment_http_endpoints }}'

- name: Validate custom command checks
  ansible.builtin.assert:
    that:
      - item.cmd is defined
      - item.cmd | string | length > 0
    fail_msg: Each assessment_commands item must define cmd.
  loop: '{{ assessment_commands }}'

- name: Validate host audit inputs
  ansible.builtin.assert:
    that:
      - assessment_audit_enabled | bool
      - assessment_audit_toolbox_script is string
      - assessment_audit_toolbox_script | length > 0
      - assessment_audit_ssh_port | int > 0
      - assessment_audit_ssh_port | int <= 65535
      - assessment_audit_ssh_users is iterable
      - assessment_audit_ssh_users is not string
      - assessment_audit_admin_users is iterable
      - assessment_audit_admin_users is not string
      - assessment_audit_service_users is iterable
      - assessment_audit_service_users is not string
      - assessment_audit_disk_threshold | int > 0
      - assessment_audit_critical_systemd_units is iterable
      - assessment_audit_critical_systemd_units is not string
      - assessment_audit_inactive_systemd_units is iterable
      - assessment_audit_inactive_systemd_units is not string
      - assessment_audit_running_systemd_unit_file_states is iterable
      - assessment_audit_running_systemd_unit_file_states is not string
      - assessment_audit_sysctl_params is iterable
      - assessment_audit_sysctl_params is not string
      - assessment_audit_log_match_limit | int > 0
    fail_msg: Host audit inputs must be valid lists, ports, thresholds, and positive assessment_audit_log_match_limit when assessment audit is enabled.
  when: assessment_audit_enabled | bool

- name: Validate host audit critical systemd units
  ansible.builtin.assert:
    that:
      - item | string | trim | length > 0
    fail_msg: Every assessment_audit_critical_systemd_units item must be a non-empty systemd unit name.
  loop: '{{ assessment_audit_critical_systemd_units }}'
  when: assessment_audit_enabled | bool

- name: Validate host audit inactive systemd units
  ansible.builtin.assert:
    that:
      - item | string | trim | length > 0
    fail_msg: Every assessment_audit_inactive_systemd_units item must be a non-empty systemd unit name.
  loop: '{{ assessment_audit_inactive_systemd_units }}'
  when: assessment_audit_enabled | bool

- name: Validate host audit running systemd unit file states
  ansible.builtin.assert:
    that:
      - item | string | trim | length > 0
    fail_msg: Every assessment_audit_running_systemd_unit_file_states item must be a non-empty systemd unit file state.
  loop: '{{ assessment_audit_running_systemd_unit_file_states }}'
  when: assessment_audit_enabled | bool

- name: Validate host audit sysctl params
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | trim | length > 0
      - item.value is defined
    fail_msg: Every assessment_audit_sysctl_params item must define name and value.
  loop: '{{ assessment_audit_sysctl_params }}'
  when: assessment_audit_enabled | bool
