---

- name: Validate assessment list inputs
  ansible.builtin.assert:
    that:
      - assessment_systemd_units is iterable
      - assessment_docker_containers is iterable
      - assessment_swarm_services is iterable
      - assessment_swarm_global_services is iterable
      - assessment_swarm_replicated_services is iterable
      - assessment_tcp_ports is iterable
      - assessment_http_endpoints is iterable
      - assessment_commands is iterable
      - assessment_journal_units is iterable
      - assessment_docker_log_containers is iterable
      - assessment_swarm_log_services is iterable
      - assessment_log_match_limit | int > 0
    fail_msg: Assessment inputs must be iterable lists and assessment_log_match_limit must be positive.

- name: Validate Docker Swarm global service check types
  ansible.builtin.assert:
    that:
      - item is string or item is mapping
    fail_msg: Each assessment_swarm_global_services item must be a service name or check mapping.
  loop: '{{ assessment_swarm_global_services }}'

- name: Validate Docker Swarm global service string checks
  ansible.builtin.assert:
    that:
      - item | length > 0
    fail_msg: Each assessment_swarm_global_services item must be a non-empty service name.
  loop: '{{ assessment_swarm_global_services }}'
  when: item is string

- name: Validate Docker Swarm global service mapping checks
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | length > 0
      - item.node_role is not defined or item.node_role in ['all', 'manager', 'worker']
    fail_msg: Each assessment_swarm_global_services mapping must define name and optional node_role all, manager, or worker.
  loop: '{{ assessment_swarm_global_services }}'
  when: item is mapping

- name: Validate Docker Swarm replicated service checks
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined
      - item.name | string | length > 0
      - item.replicas is defined
      - item.replicas | int >= 0
    fail_msg: Each assessment_swarm_replicated_services item must define name and non-negative replicas.
  loop: '{{ assessment_swarm_replicated_services }}'

- name: Validate TCP port checks
  ansible.builtin.assert:
    that:
      - item.port is defined
      - item.port | int > 0
      - item.port | int <= 65535
    fail_msg: Each assessment_tcp_ports item must define a valid port.
  loop: '{{ assessment_tcp_ports }}'

- name: Validate HTTP endpoint checks
  ansible.builtin.assert:
    that:
      - item.url is defined
      - item.url | string | length > 0
    fail_msg: Each assessment_http_endpoints item must define url.
  loop: '{{ assessment_http_endpoints }}'

- name: Validate custom command checks
  ansible.builtin.assert:
    that:
      - item.cmd is defined
      - item.cmd | string | length > 0
    fail_msg: Each assessment_commands item must define cmd.
  loop: '{{ assessment_commands }}'
