---

- name: Validate app stack PostgreSQL environment user override names
  ansible.builtin.assert:
    that:
      - item.value.user_name is not defined or item.value.user_suffix is not defined or item.value.user_suffix is none
      - item.value.base_name is not defined or item.value.base_suffix is not defined or item.value.base_suffix is none
    fail_msg: App stack PostgreSQL environment names must use either *_name or *_suffix, not both.
  loop: "{{ app_stack_pg_service.postgres.envs | default({}, true) | dict2items }}"
  loop_control:
    label: "{{ app_stack_pg_service.name | default('<missing-service>', true) }}:{{ item.key }}"
