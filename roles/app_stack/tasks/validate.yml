---

- name: Validate app stack variables
  ansible.builtin.assert:
    that:
      - app_stack_app_name is not none
      - app_stack_app_name | string | length > 0
      - app_stack_apps is sequence
      - app_stack_apps is not string
      - app_stack_cluster_realm is not none
      - app_stack_cluster_realm | string | length > 0
      - app_stack_network_enabled is boolean
      - app_stack_pg_host is not none
      - app_stack_pg_host | string | length > 0
      - app_stack_pg_port is number or app_stack_pg_port | string | length > 0
      - app_stack_pg_backup_concurrency | string is match('^[1-9][0-9]*$')
      - app_stack_pg_recover_concurrency | string is match('^[1-9][0-9]*$')
      - app_stack_pg_recover_no_prepare is boolean
      - app_stack_pg_recover_no_recreate is boolean
      - app_stack_extra_pg_envs is sequence
      - app_stack_extra_pg_envs is not string
      - app_stack_postgres_backup_sudoers_enabled is boolean
    fail_msg: Define app stack app, realm, and PostgreSQL variables.
  when: app_stack_enabled | bool or app_stack_network_enabled | bool

- name: Validate app stack network definitions
  ansible.builtin.assert:
    that:
      - item.envs | default([], true) is sequence
      - item.envs | default([], true) is not string
      - item.envs | default([], true) | map(attribute='slug') | reject('truthy') | list | length == 0
    fail_msg: Each app stack definition must use an envs list with slug items when app networks are enabled.
  loop: '{{ app_stack_selected_apps }}'
  loop_control:
    label: "{{ item.name | default('<missing-name>', true) }}"
  when: app_stack_network_enabled | bool

- name: Validate app stack backup S3 variables
  ansible.builtin.assert:
    that:
      - app_stack_backups_s3_bucket | string | length > 0
      - app_stack_backups_s3_endpoint | string | length > 0
      - app_stack_backups_s3_region | string | length > 0
    fail_msg: Define app stack backup S3 bucket, endpoint, and region when S3 keys are set.
  when:
    - app_stack_enabled | bool
    - app_stack_backups_s3_enabled | bool

- name: Validate app stack extra PostgreSQL env definitions
  ansible.builtin.assert:
    that:
      - item.pg_base is defined
      - item.pg_base | string | length > 0
      - item.pg_user is defined
      - item.pg_user | string | length > 0
      - item.pg_pass is defined
      - item.pg_pass | string | length > 0
    fail_msg: Each enabled app stack extra PostgreSQL env must define pg_base, pg_user, and pg_pass.
  loop: '{{ app_stack_extra_pg_envs }}'
  loop_control:
    label: "{{ item.pg_base | default('<missing-base>', true) }}"
  when:
    - app_stack_enabled | bool
    - item.enabled | default(true, true) | bool

- name: Validate app stack PostgreSQL service user override names
  ansible.builtin.assert:
    that:
      - item.1.postgres.user_name is not defined or item.1.postgres.user_suffix is not defined or item.1.postgres.user_suffix is none
      - item.1.postgres.base_name is not defined or item.1.postgres.base_suffix is not defined or item.1.postgres.base_suffix is none
    fail_msg: App stack PostgreSQL service names must use either *_name or *_suffix, not both.
  with_subelements:
    - '{{ app_stack_selected_apps }}'
    - services
    - skip_missing: true
  loop_control:
    label: "{{ item.1.name | default('<missing-service>', true) }}"
  when:
    - app_stack_enabled | bool
    - item.1.postgres is defined

- name: Validate app stack PostgreSQL app user definition names
  ansible.builtin.assert:
    that:
      - item.1.name is defined or item.1.name_suffix is defined
      - item.1.name is not defined or item.1.name_suffix is not defined or item.1.name_suffix is none
    fail_msg: App stack PostgreSQL app users must use either name or name_suffix, not both.
  with_subelements:
    - '{{ app_stack_selected_apps }}'
    - pg_users
    - skip_missing: true
  loop_control:
    label: "{{ item.1.name | default(item.1.name_suffix | default('<missing-name>', true), true) }}"
  when: app_stack_enabled | bool

- name: Validate app stack PostgreSQL app database definition names
  ansible.builtin.assert:
    that:
      - item.1.name is defined or item.1.name_suffix is defined
      - item.1.name is not defined or item.1.name_suffix is not defined or item.1.name_suffix is none
      - item.1.owner is defined or item.1.owner_suffix is defined
      - item.1.owner is not defined or item.1.owner_suffix is not defined or item.1.owner_suffix is none
    fail_msg: App stack PostgreSQL app databases must use either name or name_suffix and either owner or owner_suffix.
  with_subelements:
    - '{{ app_stack_selected_apps }}'
    - pg_bases
    - skip_missing: true
  loop_control:
    label: "{{ item.1.name | default(item.1.name_suffix | default('<missing-name>', true), true) }}"
  when: app_stack_enabled | bool

- name: Validate app stack PostgreSQL environment user override names
  ansible.builtin.include_tasks: validate_postgresql_env_user.yml
  vars:
    app_stack_pg_service: '{{ item.1 }}'
  with_subelements:
    - '{{ app_stack_selected_apps }}'
    - services
    - skip_missing: true
  loop_control:
    label: "{{ item.1.name | default('<missing-service>', true) }}"
  when:
    - app_stack_enabled | bool
    - item.1.postgres is defined
