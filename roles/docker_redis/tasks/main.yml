---

- name: Show Redis memory limit
  ansible.builtin.debug:
    var: docker_redis_mem_lim

- name: Create docker volumes
  become: true
  community.docker.docker_volume:
    name: '{{ docker_redis_data_volume }}'

- name: Start redis container
  become: true
  community.docker.docker_container:
    hostname: '{{ docker_redis_hostname }}.{{ inventory_hostname }}'
    name: '{{ docker_redis_container_name }}'
    image: '{{ docker_redis_image_full }}'
    command: "{{ docker_redis_command if docker_redis_command | string | length > 0 else omit }}"
    restart_policy: unless-stopped
    memory_reservation: '{{ docker_redis_mem_res }}'
    memory: '{{ docker_redis_mem_lim }}'
    memory_swap: '{{ docker_redis_mem_swp }}'
    network_mode: host
    volumes:
      - '{{ docker_redis_data_volume }}:/data'
    healthcheck: "{{ {'test': ['CMD-SHELL', 'redis-cli ping | grep PONG'], 'timeout': '2s', 'interval': '10s', 'start_period': '5s'} if docker_redis_healthcheck_enabled | bool else omit }}"

- name: Verify redis container is running
  become: true
  community.docker.docker_container_info:
    name: '{{ docker_redis_container_name }}'
  register: docker_redis_container_info
  until:
    - docker_redis_container_info.exists
    - docker_redis_container_info.container.State.Running | bool
  retries: 10
  delay: 1
  when: not ansible_check_mode

- name: Wait for redis to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: '{{ docker_redis_port }}'
    delay: 1
    timeout: 10
  when: not ansible_check_mode
