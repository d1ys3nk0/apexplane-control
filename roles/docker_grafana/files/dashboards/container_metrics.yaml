            - color: green
              value: 0
            - color: red
              value: 80
      overrides:
        - matcher:
            id: byName
            options: id
          properties:
            - id: custom.width
              value: 260
        - matcher:
            id: byName
            options: Running
          properties:
            - id: unit
              value: d
            - id: decimals
              value: 1
            - id: custom.cellOptions
              value:
