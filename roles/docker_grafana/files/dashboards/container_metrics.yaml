          pointSize: 5
          scaleDistribution:
            type: linear
          showPoints: never
          spanNulls: false
          stacking:
            group: A
            mode: normal
          thresholdsStyle:
            mode: 'off'
        mappings: []
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: 0
            - color: red
              value: 80
        unit: percent
      overrides: []
    gridPos:
      h: 7
      w: 24
      x: 0
      y: 1
    id: 15
