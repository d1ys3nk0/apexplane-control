        mode: multi
        sort: none
    pluginVersion: 12.1.1
    targets:
      - datasource:
          type: prometheus
          uid: PBFA97CFB590B2093
        editorMode: code
        expr: sum(rate(container_cpu_usage_seconds_total{job="docker",world=~"$world",realm=~"$realm",cluster=~"$cluster",container_name=~"$container_name"}[5m])) by (name) * 100
        hide: false
        interval: ''
        legendFormat: '{{name}}'
        range: true
        refId: A
    title: CPU Usage
    type: timeseries
