        instant: true
        interval: ''
        legendFormat: '{{name}}'
        refId: A
    title: Containers Info
    transformations:
      - id: filterFieldsByName
        options:
          include:
            names:
              - instance
              - Value
              - container_name
      - id: organize
        options:
          excludeByName: {}
          includeByName: {}
          indexByName:
            Value: 2
            container_name: 1
            instance: 0
          renameByName:
            Value: Running
            container_label_com_docker_compose_project: Label
            container_label_com_docker_compose_project_working_dir: Working dir
            container_label_com_docker_compose_service: Service
            container_name: Container
            image: Registry Image
            instance: Instance
            name: Name
    type: table
