---

- name: Ensure Mattermost group exists
  become: true
  ansible.builtin.group:
    name: mattermost
    system: true

- name: Ensure Mattermost user exists
  become: true
  ansible.builtin.user:
    name: mattermost
    group: mattermost
    home: '{{ mattermost_install_dir }}'
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Ensure Mattermost cache directory exists
  become: true
  ansible.builtin.file:
    path: '{{ mattermost_cache_dir }}'
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Mattermost Team Edition archive
  become: true
  ansible.builtin.get_url:
    url: '{{ mattermost_archive_url }}'
    dest: '{{ mattermost_cache_dir }}/mattermost-team-{{ mattermost_version }}-linux-amd64.tar.gz'
    checksum: '{{ mattermost_archive_checksum }}'
    mode: '0644'
    tmp_dest: /var/tmp

- name: Inspect installed Mattermost version
  become: true
  ansible.builtin.command:
    argv:
      - '{{ mattermost_install_dir }}/bin/mattermost'
      - version
  register: mattermost_installed_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Create temporary Mattermost extract directory
  become: true
  ansible.builtin.tempfile:
    state: directory
    suffix: mattermost-team
  register: mattermost_extract_temp
  changed_when: false
  check_mode: false
  when: mattermost_installed_version.rc != 0 or ('Version' ~ ':' ~ ' ' ~ mattermost_version) not in mattermost_installed_version.stdout

- name: Extract Mattermost Team Edition archive
  become: true
  ansible.builtin.unarchive:
    src: '{{ mattermost_cache_dir }}/mattermost-team-{{ mattermost_version }}-linux-amd64.tar.gz'
    dest: '{{ mattermost_extract_temp.path }}'
    remote_src: true
    extra_opts:
      - --strip-components=1
  when: mattermost_extract_temp.path is defined

- name: Stop Mattermost before replacing installed files
  become: true
  ansible.builtin.systemd:
    name: mattermost
    state: stopped
  failed_when: false
  when:
    - mattermost_extract_temp.path is defined
    - not ansible_check_mode

- name: Install Mattermost Team Edition files
  become: true
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import os
        import shutil
        import sys
        from pathlib import Path

        source = Path(sys.argv[1])
        target = Path(sys.argv[2])
        mutable_paths = [
            Path("config"),
            Path("data"),
            Path("plugins"),
            Path("client/plugins"),
            Path("logs"),
        ]

        for relative_path in mutable_paths:
            old_path = target / relative_path
            new_path = source / relative_path
            if not old_path.exists():
                continue
            if new_path.exists():
                if new_path.is_dir():
                    shutil.rmtree(new_path)
                else:
                    new_path.unlink()
            new_path.parent.mkdir(parents=True, exist_ok=True)
            shutil.move(str(old_path), str(new_path))

        if target.exists():
            shutil.rmtree(target)
        shutil.move(str(source), str(target))
        os.chown(target, 0, 0)
      - '{{ mattermost_extract_temp.path }}'
      - '{{ mattermost_install_dir }}'
  register: mattermost_install
  changed_when: true
  notify: Restart Mattermost
  when: mattermost_extract_temp.path is defined

- name: Ensure Mattermost runtime paths are owned by mattermost
  become: true
  ansible.builtin.file:
    path: '{{ mattermost_install_dir }}/{{ item }}'
    state: directory
    owner: mattermost
    group: mattermost
    recurse: true
  loop:
    - config
    - data
    - logs
    - plugins
    - client/plugins
  loop_control:
    label: '{{ mattermost_install_dir }}/{{ item }}'
  when: not ansible_check_mode

- name: Install Mattermost systemd service
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/mattermost.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Mattermost
      After=network.target postgresql.service
      BindsTo=postgresql.service

      [Service]
      Type=notify
      ExecStart={{ mattermost_install_dir }}/bin/mattermost
      TimeoutStartSec=3600
      Restart=always
      RestartSec=10
      WorkingDirectory={{ mattermost_install_dir }}
      User=mattermost
      Group=mattermost
      LimitNOFILE=49152

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd
    - Restart Mattermost
