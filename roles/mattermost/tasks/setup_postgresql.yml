---

- name: Install Mattermost PostgreSQL module dependency
  become: true
  ansible.builtin.apt:
    name: python3-psycopg2
    state: present
    update_cache: true
    autoclean: true

- name: Create Mattermost PostgreSQL user
  community.postgresql.postgresql_user:
    name: '{{ mattermost_pg_user }}'
    password: '{{ mattermost_pg_pass }}'
    role_attr_flags: LOGIN
    login_host: '{{ mattermost_pg_host }}'
    login_port: '{{ mattermost_pg_port }}'
    login_user: '{{ mattermost_pg_admin_user }}'
    login_password: '{{ mattermost_pg_admin_pass }}'
  no_log: '{{ mattermost_nolog }}'

- name: Create Mattermost PostgreSQL database
  community.postgresql.postgresql_db:
    name: '{{ mattermost_pg_base }}'
    owner: '{{ mattermost_pg_user }}'
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    login_host: '{{ mattermost_pg_host }}'
    login_port: '{{ mattermost_pg_port }}'
    login_user: '{{ mattermost_pg_admin_user }}'
    login_password: '{{ mattermost_pg_admin_pass }}'
  no_log: '{{ mattermost_nolog }}'

- name: Grant Mattermost database privileges
  community.postgresql.postgresql_privs:
    db: postgres
    type: database
    objs: '{{ mattermost_pg_base }}'
    privs: ALL
    roles: '{{ mattermost_pg_user }}'
    login_host: '{{ mattermost_pg_host }}'
    login_port: '{{ mattermost_pg_port }}'
    login_user: '{{ mattermost_pg_admin_user }}'
    login_password: '{{ mattermost_pg_admin_pass }}'
  no_log: '{{ mattermost_nolog }}'

- name: Grant Mattermost public schema privileges
  community.postgresql.postgresql_privs:
    db: '{{ mattermost_pg_base }}'
    type: schema
    objs: public
    privs: USAGE,CREATE
    roles: '{{ mattermost_pg_user }}'
    login_host: '{{ mattermost_pg_host }}'
    login_port: '{{ mattermost_pg_port }}'
    login_user: '{{ mattermost_pg_admin_user }}'
    login_password: '{{ mattermost_pg_admin_pass }}'
  no_log: '{{ mattermost_nolog }}'
