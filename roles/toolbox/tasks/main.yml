  when: toolbox_postgres_enabled | bool

- name: Remove disabled PostgreSQL executables
  become: true
  ansible.builtin.file:
    path: '{{ toolbox_bin_dir }}/{{ item.name }}'
    state: absent
  loop: '{{ toolbox_postgres_scripts }}'
  when: not toolbox_postgres_enabled | bool

- name: Install Sentry executables from files
  become: true
  ansible.builtin.copy:
    src: scripts/{{ item.src }}
    dest: '{{ toolbox_bin_dir }}/{{ item.name }}'
    mode: '0755'
