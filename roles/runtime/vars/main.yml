---

runtime_ci_mode: "{{ lookup('env', 'CI') | default('0', true) in ['1', 'true'] }}"
runtime_debug_mode: "{{ lookup('env', 'DEBUG') | default('0', true) in ['1', 'true'] }}"
runtime_nolog: '{{ (runtime_ci_mode | bool) and not (runtime_debug_mode | bool) }}'
runtime_pg_provision_enabled: "{{ runtime_pg_admin_user | string | length > 0 and runtime_pg_admin_pass | string | length > 0 }}"
runtime_pg_backup_s3_enabled: "{{ runtime_pg_backup_s3_access_key | string | length > 0 and runtime_pg_backup_s3_secret_key | string | length > 0 }}"
runtime_pg_recover_s3_enabled: "{{ runtime_pg_recover_s3_access_key | string | length > 0 and runtime_pg_recover_s3_secret_key | string | length > 0 }}"
runtime_selected_apps: "{{ runtime_apps | default([], true) | selectattr('enabled', 'undefined') | list + runtime_apps | default([], true) | selectattr('enabled', 'defined') | selectattr('enabled') | list }}"
runtime_pg_base_items: "{{ runtime_pg_bases | default([], true) }}"
runtime_unit_secret_items: >-
  {%- set runtime_secret_items = [] -%}
  {%- for runtime_secret_app in runtime_selected_apps -%}
    {%- for runtime_secret_env in runtime_secret_app.envs | default([], true) -%}
      {%- for runtime_secret_service in runtime_secret_env.services | default([], true) if runtime_secret_service.secrets is defined and runtime_secret_service.secrets | length > 0 -%}
        {%- set _ = runtime_secret_items.append({'app': runtime_secret_app.name, 'env': runtime_secret_env.slug, 'unit': runtime_secret_service.name, 'secrets': runtime_secret_service.secrets}) -%}
      {%- endfor -%}
    {%- endfor -%}
  {%- endfor -%}
  {{ runtime_secret_items }}
