---

- name: Create runtime PostgreSQL env directory
  become: true
  ansible.builtin.file:
    path: /home/{{ item.name }}/postgres
    state: directory
    mode: '0750'
    owner: '{{ item.name }}'
    group: '{{ item.name }}'
  loop: '{{ runtime_selected_apps }}'
  loop_control:
    label: '{{ item.name }}'
  when: runtime_enabled | bool

- name: Create runtime PostgreSQL client env files
  become: true
  vars:
    pg_base: '{{ item.base }}'
    pg_user: '{{ item.user }}'
    pg_pass: '{{ item.pass }}'
    pg_host: "{{ runtime_pg_host }}"
    pg_port: "{{ runtime_pg_port }}"
    pg_ssl: "{{ runtime_pg_ssl }}"
    pg_recover_s3_prefix: "{{ item.recover_s3_prefix | default(runtime_pg_recover_s3_prefix, true) }}"
  ansible.builtin.template:
    src: postgres.env.j2
    dest: /home/{{ item.app }}/postgres/{{ pg_base }}.env
    mode: '0600'
    owner: '{{ item.app }}'
    group: '{{ item.app }}'
  no_log: '{{ runtime_nolog }}'
  loop: '{{ runtime_pg_base_items }}'
  loop_control:
    label: "{{ item.base | default('<missing-base>', true) }}"
  when: runtime_enabled | bool
