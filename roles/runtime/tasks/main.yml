---

- name: Validate runtime configuration
  ansible.builtin.include_tasks: validate.yml
  tags:
    - always

- name: Configure runtime Docker resources
  ansible.builtin.include_tasks: docker.yml

- name: Configure runtime secrets
  ansible.builtin.include_tasks: secrets.yml

- name: Configure runtime PostgreSQL env files
  ansible.builtin.include_tasks: postgres_env.yml

- name: Provision runtime PostgreSQL resources
  ansible.builtin.include_tasks: postgres_provision.yml
