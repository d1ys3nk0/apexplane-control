---

- name: Validate runtime variables
  ansible.builtin.assert:
    that:
      - runtime_apps is sequence
      - runtime_apps is not string
      - runtime_pg_bases is sequence
      - runtime_pg_bases is not string
      - runtime_cluster_realm is not none
      - runtime_cluster_realm | string | length > 0
      - runtime_network_enabled is boolean
      - runtime_secrets_dotenv is boolean
      - runtime_docker_secret_manager_path | string | length > 0
      - runtime_pg_host is not none
      - runtime_pg_host | string | length > 0
      - runtime_pg_port is number or runtime_pg_port | string | length > 0
    fail_msg: Define runtime app, realm, and PostgreSQL variables.
  when: runtime_enabled | bool or runtime_network_enabled | bool

- name: Validate runtime app definitions
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | length > 0
      - item.envs | default([], true) is sequence
      - item.envs | default([], true) is not string
    fail_msg: Each runtime app must define a name and an envs list.
  loop: '{{ runtime_selected_apps }}'
  loop_control:
    label: "{{ item.name | default('<missing-name>', true) }}"
  when: runtime_enabled | bool or runtime_network_enabled | bool

- name: Validate runtime app environment definitions
  ansible.builtin.assert:
    that:
      - item.1.slug is defined
      - item.1.slug | string | length > 0
      - item.1.services | default([], true) is sequence
      - item.1.services | default([], true) is not string
    fail_msg: Each runtime app environment must define a slug and a services list.
  loop: "{{ runtime_selected_apps | selectattr('envs', 'defined') | list | subelements('envs') }}"
  loop_control:
    label: "{{ item.0.name | default('<missing-app>', true) }}:{{ item.1.slug | default('<missing-env>', true) }}"
  when: runtime_enabled | bool or runtime_network_enabled | bool

- name: Validate runtime unit Docker secret definitions
  ansible.builtin.assert:
    that:
      - item.app is defined
      - item.app | string | length > 0
      - item.env is defined
      - item.env | string | length > 0
      - item.unit is defined
      - item.unit | string | length > 0
      - item.secrets is mapping
    fail_msg: Each runtime unit Docker secret must define app, env, unit, and secrets mapping.
  loop: '{{ runtime_unit_secret_items }}'
  loop_control:
    label: "{{ item.app | default('<missing-app>', true) }}:{{ item.env | default('<missing-env>', true) }}:{{ item.unit | default('<missing-unit>', true) }}"
  when: runtime_enabled | bool

- name: Validate runtime unit Docker secret variables
  ansible.builtin.assert:
    that:
      - item.secrets.keys() | select('match', '^[A-Za-z_][A-Za-z0-9_]*$') | list | length == item.secrets | length
      - item.secrets.values() | select('mapping') | list | length == 0
      - item.secrets.values() | select('sequence') | reject('string') | list | length == 0
    fail_msg: Each runtime unit Docker secret variable must use a valid dotenv key and a scalar value.
  loop: '{{ runtime_unit_secret_items }}'
  loop_control:
    label: "{{ item.app | default('<missing-app>', true) }}:{{ item.env | default('<missing-env>', true) }}:{{ item.unit | default('<missing-unit>', true) }}"
  when: runtime_enabled | bool

- name: Check runtime Docker secret manager
  become: true
  ansible.builtin.stat:
    path: '{{ runtime_docker_secret_manager_path }}'
  register: runtime_docker_secret_manager_stat
  changed_when: false
  when:
    - runtime_enabled | bool
    - runtime_unit_secret_items | length > 0

- name: Validate runtime Docker secret manager is installed
  ansible.builtin.assert:
    that:
      - runtime_docker_secret_manager_stat.stat.exists
      - runtime_docker_secret_manager_stat.stat.executable
    fail_msg: 'Run the toolbox role with toolbox_docker_enabled: true before runtime so runtime_docker_secret_manager_path exists.'
  when:
    - runtime_enabled | bool
    - runtime_unit_secret_items | length > 0

- name: Validate runtime PostgreSQL base definitions
  ansible.builtin.assert:
    that:
      - item.app is defined
      - item.app | string | length > 0
      - item.base is defined
      - item.base | string | length > 0
      - item.user is defined
      - item.user | string | length > 0
      - item.pass is defined
      - item.pass | string | length > 0
      - item.host is not defined or item.host | string | length > 0
      - item.port is not defined or item.port is number or item.port | string | length > 0
      - item.role_attr_flags is not defined or item.role_attr_flags is string
    fail_msg: Each runtime PostgreSQL base must define app, base, user, and pass.
  loop: '{{ runtime_pg_base_items }}'
  loop_control:
    label: "{{ item.base | default('<missing-base>', true) }}"
  when: runtime_enabled | bool
