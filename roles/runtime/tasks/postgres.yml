---

- name: Create runtime PostgreSQL env directory
  become: true
  ansible.builtin.file:
    path: /home/{{ item.name }}/postgres
    state: directory
    mode: '0750'
    owner: '{{ item.name }}'
    group: '{{ item.name }}'
  loop: '{{ runtime_selected_apps }}'
  loop_control:
    label: '{{ item.name }}'
  when: runtime_enabled | bool

- name: Create runtime PostgreSQL users
  vars:
    pg_user: '{{ item.user }}'
    pg_pass: '{{ item.pass }}'
  community.postgresql.postgresql_user:
    name: '{{ pg_user }}'
    password: '{{ pg_pass }}'
    role_attr_flags: "{{ item.role_attr_flags | default('CREATEDB', true) }}"
    login_user: '{{ runtime_pg_admin_user }}'
    login_password: '{{ runtime_pg_admin_pass }}'
    login_host: "{{ item.host | default(runtime_pg_host, true) }}"
    login_port: "{{ item.port | default(runtime_pg_port, true) }}"
    ssl_mode: "{{ item.sslmode | default(runtime_pg_sslmode, true) }}"
  run_once: true
  no_log: '{{ runtime_nolog }}'
  loop: '{{ runtime_pg_base_items }}'
  loop_control:
    label: "{{ item.user | default('<missing-user>', true) }}"
  when:
    - runtime_enabled | bool
    - runtime_pg_provision_enabled | bool
    - item.provision | default(true, true) | bool

- name: Create runtime PostgreSQL databases
  vars:
    pg_base: '{{ item.base }}'
    pg_user: '{{ item.user }}'
  community.postgresql.postgresql_db:
    name: '{{ pg_base }}'
    owner: '{{ pg_user }}'
    encoding: UTF-8
    template: template0
    login_user: '{{ runtime_pg_admin_user }}'
    login_password: '{{ runtime_pg_admin_pass }}'
    login_host: "{{ item.host | default(runtime_pg_host, true) }}"
    login_port: "{{ item.port | default(runtime_pg_port, true) }}"
    ssl_mode: "{{ item.sslmode | default(runtime_pg_sslmode, true) }}"
  run_once: true
  no_log: '{{ runtime_nolog }}'
  loop: '{{ runtime_pg_base_items }}'
  loop_control:
    label: "{{ item.base | default('<missing-base>', true) }}"
  when:
    - runtime_enabled | bool
    - runtime_pg_provision_enabled | bool
    - item.provision | default(true, true) | bool

- name: Create runtime PostgreSQL client env files
  become: true
  vars:
    pg_base: '{{ item.base }}'
    pg_user: '{{ item.user }}'
    pg_pass: '{{ item.pass }}'
    pg_host: "{{ item.host | default(runtime_pg_host, true) }}"
    pg_port: "{{ item.port | default(runtime_pg_port, true) }}"
    pg_sslmode: "{{ item.sslmode | default(runtime_pg_sslmode, true) }}"
    pg_base_suffix: "{{ item.base_suffix | default(item.base, true) }}"
    pg_recover_s3_prefix_template: "{{ item.recover_s3_prefix_template | default(runtime_pg_recover_s3_prefix_template, true) }}"
  ansible.builtin.template:
    src: pg.env.j2
    dest: /home/{{ item.app }}/postgres/{{ pg_base }}.env
    mode: '0600'
    owner: '{{ item.app }}'
    group: '{{ item.app }}'
  no_log: '{{ runtime_nolog }}'
  loop: '{{ runtime_pg_base_items }}'
  loop_control:
    label: "{{ item.base | default('<missing-base>', true) }}"
  when: runtime_enabled | bool

- name: Create runtime admin PostgreSQL client env files
  become: true
  vars:
    pg_host: '{{ runtime_pg_host }}'
    pg_port: '{{ runtime_pg_port }}'
    pg_user: '{{ runtime_pg_admin_user }}'
    pg_pass: '{{ runtime_pg_admin_pass }}'
    pg_base: postgres
  ansible.builtin.template:
    src: postgres.env.j2
    dest: /home/{{ item.name }}/postgres/postgres.env
    mode: '0600'
    owner: '{{ item.name }}'
    group: '{{ item.name }}'
  no_log: '{{ runtime_nolog }}'
  loop: '{{ runtime_selected_apps }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - runtime_enabled | bool
    - runtime_pg_provision_enabled | bool

- name: Create runtime shell shortcuts
  become: true
  ansible.builtin.template:
    src: bash_local.j2
    dest: '/home/{{ item.name }}/.bash_local'
    mode: '0640'
    owner: '{{ item.name }}'
    group: '{{ item.name }}'
  loop: '{{ runtime_selected_apps }}'
  loop_control:
    label: '{{ item.name }}'
  vars:
    runtime_backup_app: '{{ item }}'
  when: runtime_enabled | bool

- name: Create runtime PostgreSQL backup sudoers rules
  become: true
  ansible.builtin.template:
    src: postgres_backup_sudoers.j2
    dest: "{{ runtime_postgres_backup_sudoers_path | default('/etc/sudoers.d/' ~ item.name ~ '-postgres-backup', true) }}"
    mode: '0440'
    owner: root
    group: root
    validate: /usr/sbin/visudo -cf %s
  loop: '{{ runtime_selected_apps }}'
  loop_control:
    label: '{{ item.name }}'
  vars:
    runtime_sudoers_app: '{{ item }}'
  when:
    - runtime_enabled | bool
    - runtime_pg_backup_s3_enabled | bool or runtime_pg_recover_s3_enabled | bool
    - runtime_postgres_backup_sudoers_enabled | bool
