---

- name: Validate Traefik enabled flag
  ansible.builtin.assert:
    that:
      - docker_swarm_traefik_enabled is boolean
      - docker_swarm_traefik_service_manage_enabled is boolean
      - docker_swarm_traefik_image_tag is not none
      - docker_swarm_traefik_image_tag | string | length > 0
    fail_msg: docker_swarm_traefik_enabled and docker_swarm_traefik_service_manage_enabled must be boolean.

- name: Validate Traefik role variables
  ansible.builtin.assert:
    that:
      - docker_swarm_traefik_network | string | length > 0
      - docker_swarm_traefik_http_expose_port | int > 0
      - docker_swarm_traefik_https_expose_port | int > 0
      - docker_swarm_traefik_health_paths is iterable
      - docker_swarm_traefik_health_paths is not string
      - docker_swarm_traefik_health_paths | length > 0
      - docker_swarm_traefik_health_paths | select('match', '^/[A-Za-z0-9._~!$&()*+,;=:@%/-]+$') | list | length == docker_swarm_traefik_health_paths | length
      - docker_swarm_traefik_health_paths | unique | length == docker_swarm_traefik_health_paths | length
      - docker_swarm_traefik_forwarded_headers_trusted_ips is iterable
      - docker_swarm_traefik_forwarded_headers_trusted_ips is not string
      - docker_swarm_traefik_forwarded_headers_trusted_ips | length > 0
      - >-
        docker_swarm_traefik_forwarded_headers_trusted_ips
        | map('string')
        | map('trim')
        | select('match', '^((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})[.]){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(3[0-2]|[12]?[0-9])$')
        | list
        | length == (docker_swarm_traefik_forwarded_headers_trusted_ips | length)
      - docker_swarm_traefik_placement_constraints is iterable
      - docker_swarm_traefik_update_order in ['stop-first', 'start-first']
      - docker_swarm_traefik_update_parallelism | int > 0
      - docker_swarm_traefik_letsencrypt_email is none or docker_swarm_traefik_letsencrypt_email | string | length > 0
      - docker_swarm_traefik_letsencrypt_email is none or docker_swarm_traefik_letsencrypt_resolver | string | length > 0
      - docker_swarm_traefik_letsencrypt_email is none or docker_swarm_traefik_letsencrypt_storage | string | length > 0
    fail_msg: Required docker_swarm_traefik variables are missing or invalid.
  when: docker_swarm_traefik_enabled | bool
