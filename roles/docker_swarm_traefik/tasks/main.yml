---

- name: Validate inputs
  ansible.builtin.include_tasks: validate.yml

- name: Create directories
  become: true
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: >-
    {{
      [
        '/etc/traefik',
        '/etc/traefik/dynamic',
        '/var/log/traefik',
      ]
      + (['/etc/traefik/acme'] if docker_swarm_traefik_letsencrypt_enabled | bool else [])
    }}
  when: docker_swarm_traefik_enabled | bool

- name: Create Traefik ACME storage
  become: true
  ansible.builtin.file:
    path: '{{ docker_swarm_traefik_letsencrypt_storage }}'
    state: touch
    mode: '0600'
    owner: root
    group: root
    access_time: preserve
    modification_time: preserve
  when:
    - docker_swarm_traefik_enabled | bool
    - docker_swarm_traefik_letsencrypt_enabled | bool

- name: Create shared routing network for Traefik-managed services
  become: true
  community.docker.docker_network:
    name: '{{ docker_swarm_traefik_network }}'
    driver: overlay
    attachable: true
    state: present
  when:
    - docker_swarm_traefik_enabled | bool
    - docker_swarm_traefik_service_manage_enabled | bool

- name: Deploy Traefik static config
  become: true
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /etc/traefik/traefik.yml
    mode: '0644'
    backup: true
  register: docker_swarm_traefik_static_config_update
  when: docker_swarm_traefik_enabled | bool

- name: Deploy Traefik as Docker Swarm service
  become: true
  community.docker.docker_swarm_service:
    name: traefik
    image: '{{ docker_swarm_traefik_image_full }}'
    args:
      - --configfile=/etc/traefik/traefik.yml
    mounts:
      - source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind
        readonly: true

      - source: /etc/traefik
        target: /etc/traefik
        type: bind

      - source: /var/log/traefik
        target: /var/log/traefik
        type: bind
    networks:
      - '{{ docker_swarm_traefik_network }}'
    mode: global
    placement:
      constraints: '{{ docker_swarm_traefik_placement_constraints }}'
    publish: '{{ docker_swarm_traefik_published_ports }}'
    update_config:
      order: '{{ docker_swarm_traefik_update_order }}'
      parallelism: '{{ docker_swarm_traefik_update_parallelism }}'
    restart_config:
      condition: any
      delay: 5s
    reservations:
      cpus: 0.1
      memory: '{{ docker_swarm_traefik_mem_res }}'
    limits:
      cpus: 1.0
      memory: '{{ docker_swarm_traefik_mem_lim }}'
    labels: >-
      {{
        {
          'traefik.enable': 'true',
          'traefik.http.routers.dashboard.service': 'api@internal',
          'traefik.http.routers.dashboard.rule': docker_swarm_traefik_dashboard_rule,
          'traefik.http.routers.dashboard.entrypoints': 'web',
          'traefik.http.routers.dashboard.tls': 'false',
          'traefik.http.services.dummy-svc.loadbalancer.server.port': '65535',
        }
        | combine(
          {
            'traefik.http.routers.health.service': 'ping@internal',
            'traefik.http.routers.health.rule': docker_swarm_traefik_health_rule,
            'traefik.http.routers.health.entrypoints': 'web',
          }
        )
      }}
  when:
    - docker_swarm_traefik_enabled | bool
    - docker_swarm_traefik_service_manage_enabled | bool
    - not ansible_check_mode

- name: Force Traefik service update on config change
  become: true
  ansible.builtin.command:
    cmd: docker service update --force traefik
  changed_when: true
  when:
    - docker_swarm_traefik_enabled | bool
    - docker_swarm_traefik_service_manage_enabled | bool
    - not ansible_check_mode
    - docker_swarm_traefik_static_config_update is defined
    - docker_swarm_traefik_static_config_update.changed

- name: Inspect active Docker Swarm nodes for Traefik
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - node
      - ls
      - --format
      - "{% raw %}{{.Hostname}}|{{.Availability}}|{{.ManagerStatus}}{% endraw %}"
  register: docker_swarm_traefik_active_nodes
  changed_when: false
  when:
    - docker_swarm_traefik_enabled | bool
    - docker_swarm_traefik_service_manage_enabled | bool
    - not ansible_check_mode

- name: Verify Traefik swarm service has one running task per expected active node
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - service
      - ps
      - --filter
      - desired-state=running
      - --format
      - "{% raw %}{{.Node}} {{.CurrentState}}{% endraw %}"
      - traefik
  register: docker_swarm_traefik_service_tasks
  until:
    - docker_swarm_traefik_expected_node_names | length > 0
    - (docker_swarm_traefik_running_task_nodes | length) == (docker_swarm_traefik_expected_node_names | length)
    - >-
      (docker_swarm_traefik_running_task_nodes | unique | sort | list)
      == (docker_swarm_traefik_expected_node_names | unique | sort | list)
  retries: 30
  delay: 2
  changed_when: false
  vars:
    docker_swarm_traefik_running_task_nodes: >-
      {{
        docker_swarm_traefik_service_tasks.stdout_lines
        | select('match', '^[^ ]+ Running')
        | map('regex_replace', '^([^ ]+) .+$', '\\1')
        | list
      }}
    docker_swarm_traefik_expected_node_names: >-
      {{
        docker_swarm_traefik_active_nodes.stdout_lines
        | select('match', docker_swarm_traefik_expected_node_regex)
        | map('regex_replace', '^([^|]+)\\|.+$', '\\1')
        | list
      }}
    docker_swarm_traefik_expected_node_regex: >-
      {{
        '^[^|]+\\|Active\\|.+$'
        if docker_swarm_traefik_manager_only_enabled | bool
        else '^[^|]+\\|Active\\|.*$'
      }}
  when:
    - docker_swarm_traefik_enabled | bool
    - docker_swarm_traefik_service_manage_enabled | bool
    - not ansible_check_mode

- name: Wait for Traefik ports to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: '{{ item }}'
    delay: 1
    timeout: 30
  loop:
    - '{{ docker_swarm_traefik_http_expose_port }}'
    - '{{ docker_swarm_traefik_https_expose_port }}'
  when:
    - docker_swarm_traefik_enabled | bool
    - not ansible_check_mode

- name: Verify Traefik
  ansible.builtin.include_tasks: verify.yml
  when: docker_swarm_traefik_enabled | bool
