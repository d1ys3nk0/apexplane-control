---

- name: Validate Dockhand variable contract
  ansible.builtin.include_tasks: validate.yml

- name: Ensure Dockhand container is running
  become: true
  community.docker.docker_container:
    name: dockhand
    image: '{{ docker_dockhand_image_full }}'
    user: '0:0'
    state: started
    restart_policy: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    published_ports:
      - 127.0.0.1:9999:9999
  when: docker_dockhand_enabled | bool

- name: Inspect Dockhand container
  become: true
  community.docker.docker_container_info:
    name: dockhand
  register: docker_dockhand_container_info
  changed_when: false
  when:
    - docker_dockhand_enabled | bool
    - not ansible_check_mode

- name: Assert Dockhand container is running
  ansible.builtin.assert:
    that:
      - docker_dockhand_container_info.exists
      - docker_dockhand_container_info.container.State.Running | bool
    fail_msg: Dockhand container is not running.
  when:
    - docker_dockhand_enabled | bool
    - not ansible_check_mode

- name: Wait for Dockhand port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 9999
    delay: 1
    timeout: 30
  when:
    - docker_dockhand_enabled | bool
    - not ansible_check_mode
