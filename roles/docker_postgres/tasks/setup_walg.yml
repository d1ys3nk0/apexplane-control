---

- name: Install PostgreSQL WAL-G executables
  become: true
  ansible.builtin.copy:
    src: scripts/{{ item }}.sh
    dest: /opt/postgres/bin/{{ item }}
    mode: '0755'
    owner: root
    group: root
  loop:
    - snap_dump
    - snap_restore
    - walg_backup
    - walg_recover

- name: Create PostgreSQL WAL-G image build directory
  become: true
  ansible.builtin.file:
    path: /opt/postgres/walg
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Install PostgreSQL WAL-G Dockerfile
  become: true
  ansible.builtin.copy:
    src: docker/Dockerfile
    dest: /opt/postgres/walg/Dockerfile
    mode: '0644'
    owner: root
    group: root

- name: Inspect PostgreSQL WAL-G image
  become: true
  community.docker.docker_image_info:
    name: '{{ docker_postgres_image_runtime }}'
  register: docker_postgres_walg_image_info

- name: Build custom PostgreSQL image with WAL-G support
  become: true
  community.docker.docker_image:
    name: '{{ docker_postgres_image_name }}-walg'
    tag: '{{ docker_postgres_image_tag }}'
    source: build
    build:
      path: /opt/postgres/walg
      dockerfile: Dockerfile
      args:
        POSTGRES_IMAGE: '{{ docker_postgres_image_full }}'
        WALG_BINARY_URL: '{{ docker_postgres_walg_binary_url }}'
  when:
    - docker_postgres_walg_image_info.images | length == 0
    - not ansible_check_mode

- name: Inspect local WAL-G repository paths
  become: true
  ansible.builtin.stat:
    path: '{{ item }}'
  loop: '{{ docker_postgres_walg_local_paths }}'
  register: docker_postgres_walg_local_path_stats
  when: docker_postgres_walg_local_paths | length > 0

- name: Validate local WAL-G repository paths
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isdir
    fail_msg: >-
      Local WAL-G repository path {{ item.item }} must exist as a directory before applying docker_postgres; mount NFS
      before running the role.
  loop: '{{ docker_postgres_walg_local_path_stats.results | default([]) }}'

- name: Start PostgreSQL WAL-G container
  become: true
  community.docker.docker_container:
    hostname: postgres.{{ inventory_hostname }}
    name: '{{ docker_postgres_container }}'
    image: '{{ docker_postgres_image_runtime }}'
    pull: false
    env:
      POSTGRES_USER: '{{ docker_postgres_pg_admin_user }}'
      POSTGRES_PASSWORD: '{{ docker_postgres_pg_admin_pass }}'
      PGDATA: '{{ docker_postgres_data_dir }}'
      PGDATABASE: postgres
      PGUSER: '{{ docker_postgres_pg_admin_user }}'
      PGHOST: /var/run/postgresql
      PGPORT: '{{ docker_postgres_port | string }}'
      WALG_COMPRESSION_METHOD: '{{ docker_postgres_walg_backup_compression_method }}'
      WALG_COMPRESSION_LEVEL: '{{ docker_postgres_walg_backup_compression_level | string }}'
      WALG_S3_PREFIX: "{{ docker_postgres_walg_backup_storage_path if docker_postgres_walg_backup_s3_enabled | bool else '' }}"
      WALG_FILE_PREFIX: "{{ docker_postgres_walg_backup_storage_path if docker_postgres_walg_backup_local_enabled | bool else '' }}"
      AWS_ENDPOINT: "{{ docker_postgres_walg_backup_s3_endpoint if docker_postgres_walg_backup_s3_enabled | bool else '' }}"
      AWS_REGION: "{{ docker_postgres_walg_backup_s3_region if docker_postgres_walg_backup_s3_enabled | bool else '' }}"
      AWS_ACCESS_KEY_ID: "{{ docker_postgres_walg_backup_s3_access_key if docker_postgres_walg_backup_s3_enabled | bool else '' }}"
      AWS_SECRET_ACCESS_KEY: "{{ docker_postgres_walg_backup_s3_secret_key if docker_postgres_walg_backup_s3_enabled | bool else '' }}"
    command: postgres -c 'config_file=/opt/config/postgresql.conf'
    restart_policy: unless-stopped
    shm_size: '{{ ((docker_postgres_mem_lim[:-1] | int) * 0.3) | int }}M'
    memory_reservation: '{{ docker_postgres_mem_res }}'
    memory: '{{ docker_postgres_mem_lim }}'
    memory_swap: '{{ docker_postgres_mem_swp }}'
    network_mode: host
    volumes: '{{ docker_postgres_walg_container_volumes }}'
    healthcheck:
      test: [CMD, pg_isready]
      timeout: 3s
      interval: 30s
      start_period: 30s
  when: docker_postgres_walg_image_info.images | length > 0 or not ansible_check_mode
  no_log: '{{ docker_postgres_nolog }}'
