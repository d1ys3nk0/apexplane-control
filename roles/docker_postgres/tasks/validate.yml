---

- name: Validate required Docker PostgreSQL variables
  ansible.builtin.assert:
    that:
      - docker_postgres_pg_admin_pass is not none
      - docker_postgres_pg_admin_pass | string | length > 0
      - docker_postgres_pg_admin_user is not none
      - docker_postgres_pg_admin_user | string | length > 0
      - docker_postgres_mode is not none
      - docker_postgres_mode | string | length > 0
      - docker_postgres_mode in ['leader', 'follower']
      - docker_postgres_image_name | string | length > 0
      - docker_postgres_image_tag | string | length > 0
      - docker_postgres_container | string | length > 0
      - docker_postgres_data_volume | string | length > 0
      - docker_postgres_data_root | string | length > 0
      - docker_postgres_data_root is match('^/')
      - docker_postgres_data_dir is not none
      - docker_postgres_data_dir | string | length > 0
      - docker_postgres_data_dir is match('^/')
      - docker_postgres_os_user_uid | string is match('^[1-9][0-9]*$')
      - docker_postgres_os_user_gid | string is match('^[1-9][0-9]*$')
      - docker_postgres_port | int >= 1
      - docker_postgres_port | int <= 65535
      - docker_postgres_allowed_cidr is sequence
      - docker_postgres_allowed_cidr is not string
      - docker_postgres_allowed_cidr | length > 0
      - docker_postgres_replica_port | int >= 1
      - docker_postgres_replica_port | int <= 65535
      - docker_postgres_replica_ssl in ['disable', 'allow', 'prefer', 'require', 'verify-ca', 'verify-full']

- name: Validate Docker PostgreSQL source whitelist
  ansible.builtin.assert:
    that:
      - item | string | length > 0
      - item is match('^\\S+/[0-9]{1,3}$')
      - item is match('^(((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(3[0-2]|[12]?[0-9])|[^/]*:[^/]*/(12[0-8]|1[01][0-9]|[1-9]?[0-9]))$')
    fail_msg: Set docker_postgres_allowed_cidr to CIDR ranges such as 10.0.0.0/24, 203.0.113.10/32, 2001:db8::/64, or ::/0.
  loop: '{{ docker_postgres_allowed_cidr }}'

- name: Validate Docker PostgreSQL image mode
  ansible.builtin.assert:
    that:
      - docker_postgres_walg_enabled | bool == (docker_postgres_walg_binary_url | string | length > 0)
      - not docker_postgres_walg_enabled | bool or docker_postgres_walg_binary_url is match('^https?://')
      - not docker_postgres_walg_enabled | bool or docker_postgres_walg_binary_url is match('^https?://.*/wal-g-pg[-_].*')
    fail_msg: Set docker_postgres_walg_binary_url to an HTTP(S) PostgreSQL WAL-G binary URL to build a WAL-G image from docker_postgres_image_name and docker_postgres_image_tag.

- name: Validate Docker PostgreSQL WAL-G backup settings
  ansible.builtin.assert:
    that:
      - docker_postgres_walg_backup_enabled | bool
      - docker_postgres_walg_backup_path is string
      - docker_postgres_walg_backup_path | string | length > 0
      - docker_postgres_walg_backup_path_is_s3 | bool or docker_postgres_walg_backup_path_is_local | bool
      - not docker_postgres_walg_backup_path_is_s3 | bool or docker_postgres_walg_backup_s3_endpoint | string | length > 0
      - not docker_postgres_walg_backup_path_is_s3 | bool or docker_postgres_walg_backup_s3_region | string | length > 0
      - not docker_postgres_walg_backup_path_is_s3 | bool or docker_postgres_walg_backup_s3_access_key | string | length > 0
      - not docker_postgres_walg_backup_path_is_s3 | bool or docker_postgres_walg_backup_s3_secret_key | string | length > 0
      - not docker_postgres_walg_backup_path_is_s3_relative | bool or docker_postgres_walg_backup_s3_bucket | string | length > 0
      - docker_postgres_walg_backup_hostnames is sequence
      - docker_postgres_walg_backup_hostnames is not string
      - docker_postgres_walg_backup_hostnames | length > 0
      - docker_postgres_walg_backup_delta_origin in ['LATEST', 'LATEST_FULL', 'LATEST_FULL_WITH_TTL']
      - docker_postgres_walg_backup_delta_max_steps | string is match('^[1-9][0-9]*$')
      - docker_postgres_walg_backup_compression_method | string | length > 0
      - docker_postgres_walg_backup_compression_level | string is match('^[1-9][0-9]*$')
      - docker_postgres_walg_backup_disk_rate_limit | string is match('^[1-9][0-9]*$')
      - docker_postgres_walg_backup_upload_disk_concurrency | string is match('^[1-9][0-9]*$')
      - docker_postgres_walg_backup_tar_size_threshold | string | length == 0 or docker_postgres_walg_backup_tar_size_threshold | string is match('^[1-9][0-9]*$')
    fail_msg: >-
      Define docker_postgres_walg_backup_path as s3:<key>, s3://<bucket>/<key>, or an absolute local path, and provide
      matching S3 settings or local mount availability plus at least one docker_postgres_walg_backup_hostnames item.
  when: docker_postgres_walg_backup_requested | bool

- name: Validate Docker PostgreSQL WAL-G recovery settings
  ansible.builtin.assert:
    that:
      - docker_postgres_walg_recover_enabled | bool
      - docker_postgres_walg_recover_path is string
      - docker_postgres_walg_recover_path | string | length > 0
      - docker_postgres_walg_recover_path_is_s3 | bool or docker_postgres_walg_recover_path_is_local | bool
      - not docker_postgres_walg_recover_path_is_s3 | bool or docker_postgres_walg_recover_s3_endpoint | string | length > 0
      - not docker_postgres_walg_recover_path_is_s3 | bool or docker_postgres_walg_recover_s3_region | string | length > 0
      - not docker_postgres_walg_recover_path_is_s3 | bool or docker_postgres_walg_recover_s3_access_key | string | length > 0
      - not docker_postgres_walg_recover_path_is_s3 | bool or docker_postgres_walg_recover_s3_secret_key | string | length > 0
      - not docker_postgres_walg_recover_path_is_s3_relative | bool or docker_postgres_walg_recover_s3_bucket | string | length > 0
      - docker_postgres_walg_recover_health_wait_seconds | string is match('^[1-9][0-9]*$')
      - docker_postgres_walg_recover_log_tail_lines | string is match('^[1-9][0-9]*$')
    fail_msg: >-
      Define docker_postgres_walg_recover_path as s3:<key>, s3://<bucket>/<key>, or an absolute local path, and provide
      matching S3 settings when the recovery path is S3.
  when: docker_postgres_walg_recover_requested | bool
