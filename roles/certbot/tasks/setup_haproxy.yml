---

- name: Install HAProxy Certbot deploy hook
  become: true
  ansible.builtin.template:
    src: certbot/haproxy-deploy.sh.j2
    dest: '{{ certbot_hook_dir }}/haproxy-deploy'
    owner: root
    group: root
    mode: '0755'

- name: Create HAProxy certificate spread SSH key directory
  become: true
  ansible.builtin.file:
    path: '{{ certbot_haproxy_spread_ssh_dir }}'
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: certbot_haproxy_spread_enabled | bool

- name: Install HAProxy certificate spread SSH key
  become: true
  ansible.builtin.copy:
    src: '{{ certbot_haproxy_spread_ssh_private_key_file }}'
    dest: '{{ certbot_haproxy_spread_ssh_private_key_path }}'
    owner: root
    group: root
    mode: '0600'
  no_log: '{{ certbot_nolog }}'
  diff: false
  when: certbot_haproxy_spread_enabled | bool

- name: Install HAProxy certificate spread hook
  become: true
  ansible.builtin.template:
    src: certbot/haproxy-spread.sh.j2
    dest: '{{ certbot_hook_dir }}/haproxy-spread'
    owner: root
    group: root
    mode: '0755'
  when: certbot_haproxy_spread_enabled | bool

- name: Remove HAProxy certificate spread hook when disabled
  become: true
  ansible.builtin.file:
    path: '{{ certbot_hook_dir }}/haproxy-spread'
    state: absent
  when: not certbot_haproxy_spread_enabled | bool

- name: Remove HAProxy certificate spread SSH key when disabled
  become: true
  ansible.builtin.file:
    path: '{{ certbot_haproxy_spread_ssh_private_key_path }}'
    state: absent
  no_log: '{{ certbot_nolog }}'
  when: not certbot_haproxy_spread_enabled | bool
