---

- name: Validate Xray variable contract
  ansible.builtin.include_tasks: validate.yml

- name: Deploy Xray service from generated config
  become: true
  run_once: true
  when: docker_swarm_xray_enabled | bool
  block:
    - name: Create temporary Xray config file
      ansible.builtin.tempfile:
        state: file
        suffix: .json
      register: docker_swarm_xray_temp_config
      check_mode: false
      changed_when: false
      when: not ansible_check_mode

    - name: Render temporary Xray config file
      ansible.builtin.copy:
        content: '{{ docker_swarm_xray_config_data }}'
        dest: '{{ docker_swarm_xray_temp_config.path }}'
        mode: '0600'
        owner: root
        group: root
      check_mode: false
      changed_when: false
      no_log: '{{ docker_swarm_xray_nolog }}'
      when: not ansible_check_mode

    - name: Remove stale Xray config check container
      community.docker.docker_container:
        name: xray-config-check
        state: absent
      changed_when: false
      when: not ansible_check_mode

    - name: Validate rendered Xray config
      community.docker.docker_container:
        name: xray-config-check
        image: '{{ docker_swarm_xray_image_full }}'
        entrypoint: xray
        command:
          - run
          - -test
          - -config
          - '{{ docker_swarm_xray_config_filename }}'
        detach: false
        cleanup: true
        volumes:
          - '{{ docker_swarm_xray_temp_config.path }}:{{ docker_swarm_xray_config_filename }}:ro'
      changed_when: false
      no_log: '{{ docker_swarm_xray_nolog }}'
      when: not ansible_check_mode

    - name: Ensure Xray docker config created
      community.docker.docker_config:
        name: '{{ docker_swarm_xray_config_name }}'
        data_src: '{{ docker_swarm_xray_temp_config.path }}'
        state: present
      no_log: '{{ docker_swarm_xray_nolog }}'
      when: not ansible_check_mode

    - name: Ensure Xray swarm service created
      community.docker.docker_swarm_service:
        name: '{{ docker_swarm_xray_service_name }}'
        image: '{{ docker_swarm_xray_image_full }}'
        configs:
          - config_name: '{{ docker_swarm_xray_config_name }}'
            filename: '{{ docker_swarm_xray_config_filename }}'
            mode: 0444
        healthcheck:
          test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/localhost/{{ docker_swarm_xray_healthcheck_port }}']
          interval: 30s
          timeout: 5s
          start_period: 30s
          retries: 2
        mode: replicated
        replicas: '{{ docker_swarm_xray_replicas }}'
        endpoint_mode: vip
        publish: '{{ docker_swarm_xray_port_publish_items }}'
        update_config:
          order: start-first
          parallelism: '{{ docker_swarm_xray_update_parallelism }}'
          delay: '{{ docker_swarm_xray_update_delay }}'
          monitor: '{{ docker_swarm_xray_update_monitor }}'
          failure_action: rollback
        rollback_config:
          order: start-first
          parallelism: '{{ docker_swarm_xray_update_parallelism }}'
          delay: '{{ docker_swarm_xray_update_delay }}'
          monitor: '{{ docker_swarm_xray_update_monitor }}'
        restart_config:
          condition: any
          delay: 5s
        reservations:
          cpus: '{{ docker_swarm_xray_cpu_res }}'
          memory: '{{ docker_swarm_xray_mem_res }}'
        limits:
          cpus: '{{ docker_swarm_xray_cpu_lim }}'
          memory: '{{ docker_swarm_xray_mem_lim }}'
      no_log: '{{ docker_swarm_xray_nolog }}'
      when: not ansible_check_mode

    - name: Verify Xray swarm service has a running task
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - --filter
          - desired-state=running
          - --format
          - "{% raw %}{{.CurrentState}}{% endraw %}"
          - '{{ docker_swarm_xray_service_name }}'
      register: docker_swarm_xray_service_tasks
      until: docker_swarm_xray_service_tasks.stdout_lines | select('match', '^Running') | list | length > 0
      retries: 30
      delay: 2
      changed_when: false
      when: not ansible_check_mode

    - name: Wait for Xray published ports to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: '{{ item.published_port }}'
        delay: 1
        timeout: 30
      loop: '{{ docker_swarm_xray_wait_items }}'
      loop_control:
        label: '{{ item.published_port }}'
      when: not ansible_check_mode
  always:
    - name: Remove temporary Xray config file
      ansible.builtin.file:
        path: '{{ docker_swarm_xray_temp_config.path }}'
        state: absent
      changed_when: false
      when: docker_swarm_xray_temp_config.path is defined

- name: Deploy Xray fallback HTTP service
  become: true
  run_once: true
  when:
    - docker_swarm_xray_enabled | bool
    - docker_swarm_xray_fallback_enabled | bool
  block:
    - name: Ensure Xray fallback docker config created
      community.docker.docker_config:
        name: '{{ docker_swarm_xray_fallback_config_name }}'
        data: '{{ docker_swarm_xray_fallback_config_data }}'
        state: present
      when: not ansible_check_mode

    - name: Ensure Xray fallback swarm service created
      community.docker.docker_swarm_service:
        name: '{{ docker_swarm_xray_fallback_service_name }}'
        image: '{{ docker_swarm_xray_fallback_image_full }}'
        configs:
          - config_name: '{{ docker_swarm_xray_fallback_config_name }}'
            filename: '{{ docker_swarm_xray_fallback_config_filename }}'
            mode: 0444
        mode: replicated
        replicas: 1
        endpoint_mode: vip
        publish:
          - published_port: '{{ docker_swarm_xray_fallback_port }}'
            target_port: 80
            protocol: tcp
            mode: ingress
        update_config:
          order: start-first
          parallelism: 1
          delay: '{{ docker_swarm_xray_update_delay }}'
          monitor: '{{ docker_swarm_xray_update_monitor }}'
          failure_action: rollback
        rollback_config:
          order: start-first
          parallelism: 1
          delay: '{{ docker_swarm_xray_update_delay }}'
          monitor: '{{ docker_swarm_xray_update_monitor }}'
        restart_config:
          condition: any
          delay: 5s
        reservations:
          cpus: '{{ docker_swarm_xray_fallback_cpu_res }}'
          memory: '{{ docker_swarm_xray_fallback_mem_res }}'
        limits:
          cpus: '{{ docker_swarm_xray_fallback_cpu_lim }}'
          memory: '{{ docker_swarm_xray_fallback_mem_lim }}'
      when: not ansible_check_mode

    - name: Verify Xray fallback swarm service has a running task
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - --filter
          - desired-state=running
          - --format
          - "{% raw %}{{.CurrentState}}{% endraw %}"
          - '{{ docker_swarm_xray_fallback_service_name }}'
      register: docker_swarm_xray_fallback_service_tasks
      until: docker_swarm_xray_fallback_service_tasks.stdout_lines | select('match', '^Running') | list | length > 0
      retries: 30
      delay: 2
      changed_when: false
      when: not ansible_check_mode

    - name: Wait for Xray fallback published port to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: '{{ docker_swarm_xray_fallback_port }}'
        delay: 1
        timeout: 30
      when: not ansible_check_mode
