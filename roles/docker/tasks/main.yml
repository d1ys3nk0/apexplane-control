---

- name: Validate Docker variable contract
  ansible.builtin.include_tasks: validate.yml

- name: Add Docker GPG
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    tmp_dest: /var/tmp

- name: Add Docker Repository
  become: true
  ansible.builtin.apt_repository:
    repo: deb [arch={{ docker_dpkg_arch }} signed-by=/etc/apt/keyrings/docker.asc] {{ docker_deb_repo }} {{ ansible_distribution_release | lower }} stable
    state: present

- name: Install apt packages
  become: true
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-ce
      - docker-ce-cli
    state: present
    update_cache: true
    autoclean: true

- name: Update config
  become: true
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: '0644'
    content: "{{ docker_daemon_config | to_nice_json }}\n"
  register: docker_update_config

- name: Create Docker systemd override directory
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: '0755'
  when: docker_tcp_socket_enabled | bool

- name: Update Docker systemd override
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service.d/docker.conf
    mode: '0644'
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/dockerd
  register: docker_update_systemd_override
  when: docker_tcp_socket_enabled | bool

- name: Remove Docker systemd override
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d/docker.conf
    state: absent
  register: docker_remove_systemd_override
  when: not (docker_tcp_socket_enabled | bool)

- name: Reload systemd daemon after Docker override change
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: >-
    (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
    or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)

- name: Report Docker restart approval required in check mode
  ansible.builtin.debug:
    msg: >-
      Docker daemon configuration would change. A live run requires approval through YES=1, YES=true, or interactive
      approval by typing: yes.
  changed_when: true
  when: >-
    ansible_check_mode
    and (
      docker_update_config.changed
      or (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
      or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)
    )

- name: Refuse Docker restart in non-interactive mode
  ansible.builtin.fail:
    msg: >-
      Docker daemon restart is required but INTERACTIVE is disabled and YES is not set. Run interactively and type
      "yes", or set YES=1 or YES=true to approve the restart.
  when:
    - not ansible_check_mode
    - not (docker_interactive_mode | bool)
    - not (docker_yes_mode | bool)
    - >-
      docker_update_config.changed
      or (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
      or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)

- name: Confirm Docker restart
  ansible.builtin.pause:
    prompt: |-
      Docker daemon configuration changed and restarting Docker can interrupt running containers.

      Type "yes" to proceed
  register: docker_restart_approval
  when:
    - not ansible_check_mode
    - docker_interactive_mode | bool
    - not (docker_yes_mode | bool)
    - >-
      docker_update_config.changed
      or (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
      or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)

- name: Refuse Docker restart without typed approval
  ansible.builtin.fail:
    msg: Docker daemon restart approval was invalid. Type "yes" to proceed or press Enter to skip.
  when:
    - not ansible_check_mode
    - docker_interactive_mode | bool
    - not (docker_yes_mode | bool)
    - >-
      docker_update_config.changed
      or (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
      or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)
    - docker_restart_approval.user_input | default('') != ''
    - docker_restart_approval.user_input | default('') | lower != 'yes'

- name: Restart Docker when approved
  become: true
  ansible.builtin.service:
    name: docker
    state: restarted
  when: >-
    not ansible_check_mode
    and docker_restart_approved
    and (
      docker_update_config.changed
      or (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
      or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)
    )

- name: Verify Docker service is active after restart
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - docker
  register: docker_service_health
  changed_when: false
  when: >-
    not ansible_check_mode
    and docker_restart_approved
    and (
      docker_update_config.changed
      or (docker_update_systemd_override is defined and docker_update_systemd_override.changed)
      or (docker_remove_systemd_override is defined and docker_remove_systemd_override.changed)
    )
