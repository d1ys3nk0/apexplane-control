---

- name: Validate Docker variable contract
  ansible.builtin.include_tasks: validate.yml

- name: Add Docker GPG
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    tmp_dest: /var/tmp

- name: Add Docker Repository
  become: true
  ansible.builtin.apt_repository:
    repo: deb [arch={{ docker_dpkg_arch }} signed-by=/etc/apt/keyrings/docker.asc] {{ docker_deb_repo }} {{ ansible_distribution_release | lower }} stable
    state: present

- name: Install apt packages
  become: true
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-ce
      - docker-ce-cli
    state: present
    update_cache: true
    autoclean: true

- name: Update config
  become: true
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: '0644'
  register: docker_update_config

- name: Report Docker restart approval required in check mode
  ansible.builtin.debug:
    msg: >-
      Docker daemon config would change. A live run with Docker force mode enabled requires interactive approval
      by typing: yes
  changed_when: true
  when: ansible_check_mode and docker_update_config.changed and docker_force_mode

- name: Refuse Docker restart in non-interactive mode
  ansible.builtin.fail:
    msg: >-
      Docker daemon restart is required but INTERACTIVE is disabled. Run interactively and type "yes" to approve the restart.
  when:
    - not ansible_check_mode
    - docker_update_config.changed
    - docker_force_mode
    - not (docker_interactive_mode | bool)

- name: Confirm Docker restart
  ansible.builtin.pause:
    prompt: |-
      Docker daemon config changed and restarting Docker can interrupt running containers.

      Type "yes" to proceed
  register: docker_restart_approval
  when:
    - not ansible_check_mode
    - docker_update_config.changed
    - docker_force_mode
    - docker_interactive_mode | bool

- name: Refuse Docker restart without typed approval
  ansible.builtin.fail:
    msg: Docker daemon restart was not approved. Type exactly "yes" to proceed.
  when:
    - not ansible_check_mode
    - docker_update_config.changed
    - docker_force_mode
    - docker_interactive_mode | bool
    - docker_restart_approval.user_input != 'yes'

- name: Restart Docker when force mode is enabled
  become: true
  ansible.builtin.service:
    name: docker
    state: restarted
  when: not ansible_check_mode and docker_update_config.changed and docker_force_mode

- name: Verify Docker service is active after restart
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - docker
  register: docker_service_health
  changed_when: false
  when: not ansible_check_mode and docker_update_config.changed and docker_force_mode
