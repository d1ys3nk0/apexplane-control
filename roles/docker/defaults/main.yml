---

docker_deb_repo: https://download.docker.com/linux/ubuntu
docker_mirrors: ['https://cr.yandex/mirror', 'https://dockerhub.timeweb.cloud']
docker_force_mode: "{{ lookup('env', 'FORCE') | default('0', true) in ['1', 'true'] }}"
docker_interactive_mode: "{{ lookup('env', 'INTERACTIVE') | default('1', true) | lower not in ['0', 'false'] }}"

docker_arch_map:
  aarch64: arm64
  x86_64: amd64
docker_dpkg_arch: '{{ docker_arch_map.get(ansible_architecture, ansible_architecture) }}'
