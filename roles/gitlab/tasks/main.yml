- name: Update config
  become: true
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    mode: '0600'
  notify:
    - Reconfigure GitLab
  no_log: '{{ gitlab_nolog }}'
