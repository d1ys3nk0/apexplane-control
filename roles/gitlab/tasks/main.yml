---

- name: Validate GitLab variable contract
  ansible.builtin.include_tasks: validate.yml

- name: Download GitLab GPG key
  become: true
  ansible.builtin.get_url:
    url: https://packages.gitlab.com/gpg.key
    dest: /usr/share/keyrings/gitlab_gitlab-ee-archive-keyring.asc
    mode: '0644'
  register: gitlab_gpg_key

- name: Convert GitLab GPG key
  become: true
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - /usr/share/keyrings/gitlab_gitlab-ee-archive-keyring.gpg
      - /usr/share/keyrings/gitlab_gitlab-ee-archive-keyring.asc
  when: gitlab_gpg_key.changed

