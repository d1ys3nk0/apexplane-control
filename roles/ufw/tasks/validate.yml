---

- name: Assert UFW required variables are set
  ansible.builtin.assert:
    that:
      - ufw_ssh_cidr is not none
      - ufw_ssh_cidr | string | length > 0
      - ufw_vpc_cidr is not none
      - ufw_vpc_cidr | string | length > 0
    fail_msg: Define UFW SSH and VPC CIDR variables before running role ufw.
