---

- name: Assert Xray top-level inputs are valid
  ansible.builtin.assert:
    that:
      - docker_xray_enabled is boolean
      - docker_xray_image_full | string | length > 0
      - docker_xray_container_name | string | length > 0
      - docker_xray_config_dir | string | length > 0
      - docker_xray_config_dir is match('^/')
      - docker_xray_config_filename | string | length > 0
      - docker_xray_config_filename is match('^/')
      - docker_xray_host_config_file | string | length > 0
      - docker_xray_host_config_file is match('^/')
      - docker_xray_network_mode == 'host'
      - docker_xray_loglevel | string | length > 0
      - docker_xray_inbounds is sequence
      - docker_xray_inbounds is not string
      - docker_xray_inbounds | length > 0
      - docker_xray_outbounds is sequence
      - docker_xray_outbounds is not string
      - docker_xray_outbounds | length > 0
      - docker_xray_routing is mapping
      - docker_xray_sniffing is mapping
      - docker_xray_mem_res | string | length > 0
      - docker_xray_mem_lim | string | length > 0
      - docker_xray_tproxy_enabled is boolean
      - docker_xray_tproxy_service_name | string | length > 0
      - docker_xray_tproxy_script_file | string | length > 0
      - docker_xray_tproxy_script_file is match('^/')
      - docker_xray_tproxy_route_table | int >= 1
      - docker_xray_tproxy_fwmark | int >= 1
      - docker_xray_tproxy_outbound_mark | int >= 1
      - docker_xray_tproxy_chain | string | length > 0
      - docker_xray_tproxy_port | int >= 1
      - docker_xray_tproxy_port | int <= 65535
      - docker_xray_tproxy_source_cidrs is sequence
      - docker_xray_tproxy_source_cidrs is not string
      - docker_xray_tproxy_bypass_cidrs is sequence
      - docker_xray_tproxy_bypass_cidrs is not string
      - docker_xray_image_tag is not none
      - docker_xray_image_tag | string | length > 0
    fail_msg: Define valid Xray image, container, config, inbound, outbound, and TPROXY settings before running role docker_xray.

- name: Assert Xray inbounds are valid
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.type | default('') in docker_xray_supported_inbound_types
      - item.tag is not defined or item.tag | string | length > 0
      - item.listen is not defined or item.listen | string | length > 0
      - item.port is defined
      - item.port | int >= 1
      - item.port | int <= 65535
    fail_msg: Each Xray inbound must define a supported type and valid port.
  loop: '{{ docker_xray_inbounds }}'
  loop_control:
    label: "{{ item.tag | default(item.type | default('unknown')) }}"

- name: Assert Xray VLESS inbounds are valid
  ansible.builtin.assert:
    that:
      - item.users is defined
      - item.users is sequence
      - item.users is not string
      - item.users | length > 0
      - item.network | default('raw') in docker_xray_supported_inbound_networks
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) in docker_xray_supported_inbound_security
      - item.network | default('raw') != 'ws' or item.security | default('none') == 'none'
      - item.network | default('raw') != 'ws' or item.ws is defined
      - item.network | default('raw') != 'ws' or item.ws is mapping
      - item.network | default('raw') != 'ws' or item.ws.path is defined
      - item.network | default('raw') != 'ws' or item.ws.path | string | trim is match('^/')
      - item.network | default('raw') != 'ws' or item.ws.headers is not defined or item.ws.headers is mapping
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) != 'reality' or item.reality is defined
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) != 'reality' or item.reality is mapping
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) != 'reality' or item.reality.target is defined
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) != 'reality' or item.reality.server_names is defined
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) != 'reality' or item.reality.private_key is defined
      - item.security | default((item.reality is defined) | ternary('reality', 'none')) != 'reality' or item.reality.short_ids is defined
    fail_msg: VLESS inbounds must define users; WebSocket inbounds must use security none and define ws.path.
  loop: "{{ docker_xray_inbounds | selectattr('type', 'defined') | selectattr('type', 'equalto', 'vless') | list }}"
  loop_control:
    label: "{{ item.tag | default('vless') }}"
  no_log: '{{ docker_xray_nolog }}'

- name: Assert Xray VLESS inbound users are valid
  ansible.builtin.assert:
    that:
      - item.1 is mapping
      - item.1.id is defined
      - item.1.id | string | length > 0
      - item.1.flow is not defined or item.1.flow | string | length > 0
    fail_msg: VLESS inbound users must define a non-empty id.
  loop: "{{ docker_xray_inbounds | selectattr('type', 'defined') | selectattr('type', 'equalto', 'vless') | list | subelements('users') }}"
  loop_control:
    label: "{{ item.0.tag | default('vless') }}"
  no_log: '{{ docker_xray_nolog }}'

- name: Assert Xray tunnel inbounds are valid
  ansible.builtin.assert:
    that:
      - item.network | default('tcp,udp') | string | length > 0
      - item.follow_redirect | default(false) | type_debug == 'bool'
    fail_msg: Tunnel inbounds must define a non-empty network and boolean follow_redirect when set.
  loop: "{{ docker_xray_inbounds | selectattr('type', 'defined') | selectattr('type', 'equalto', 'tunnel') | list }}"
  loop_control:
    label: "{{ item.tag | default('tunnel') }}"

- name: Assert Xray outbounds are valid
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.type | default('') in docker_xray_supported_outbound_types
      - item.tag is not defined or item.tag | string | length > 0
    fail_msg: Each Xray outbound must define a supported type.
  loop: '{{ docker_xray_outbounds }}'
  loop_control:
    label: "{{ item.tag | default(item.type | default('unknown')) }}"

- name: Assert Xray VLESS outbounds are valid
  ansible.builtin.assert:
    that:
      - item.address is defined
      - item.address | string | length > 0
      - item.port is defined
      - item.port | int >= 1
      - item.port | int <= 65535
      - item.id is defined
      - item.id | string | length > 0
      - item.encryption is not defined or item.encryption | string | length > 0
      - item.flow is not defined or item.flow | string | length > 0
      - item.reality is defined
      - item.reality is mapping
      - item.reality.server_name is defined
      - item.reality.server_name | string | length > 0
      - item.reality.password is defined
      - item.reality.password | string | length > 0
      - item.reality.short_id is defined
      - item.reality.short_id is not none
      - item.reality.fingerprint is not defined or item.reality.fingerprint | string | length > 0
      - item.reality.spider_x is not defined or item.reality.spider_x | string | length > 0
    fail_msg: VLESS outbounds must define address, port, id, and REALITY server_name, password, and short_id.
  loop: "{{ docker_xray_outbounds | selectattr('type', 'defined') | selectattr('type', 'equalto', 'vless') | list }}"
  loop_control:
    label: "{{ item.tag | default('vless') }}"
  no_log: '{{ docker_xray_nolog }}'

- name: Assert Xray CIDR inputs are valid
  ansible.builtin.assert:
    that:
      - item | string | length > 0
      - item is match('^\\S+/[0-9]{1,3}$')
    fail_msg: Xray TPROXY CIDR inputs must be non-empty CIDR strings.
  loop: '{{ docker_xray_tproxy_source_cidrs + docker_xray_tproxy_bypass_cidrs }}'
  loop_control:
    label: '{{ item }}'

- name: Assert Xray TPROXY inputs are complete when enabled
  ansible.builtin.assert:
    that:
      - docker_xray_tproxy_source_cidrs | length > 0
      - docker_xray_tproxy_port | int in docker_xray_tunnel_inbound_ports
    fail_msg: Xray TPROXY requires at least one source CIDR and a tunnel inbound on docker_xray_tproxy_port.
  when: docker_xray_tproxy_enabled | bool

- name: Assert Xray generated tags and ports are unique
  ansible.builtin.assert:
    that:
      - docker_xray_tag_values | unique | length == docker_xray_tag_values | length
      - docker_xray_inbound_ports | unique | length == docker_xray_inbound_ports | length
    fail_msg: Xray tags and inbound ports must be unique.
