---

version: '3'

vars:
  APEXPLANE_TOOLKIT_DIR: '{{.TASKFILE_DIR}}'

tasks:
  run:
    desc: Run an Ansible playbook or command through the ApexPlane Control wrapper
    cmds:
      - bash '{{.APEXPLANE_TOOLKIT_DIR}}/bin/run' {{.CLI_ARGS}}

  migrate:
    desc: Run the ApexPlane Control migration wrapper
    cmds:
      - bash '{{.APEXPLANE_TOOLKIT_DIR}}/bin/migrate' {{.CLI_ARGS}}

  bootstrap:
    desc: Run the ApexPlane Control bootstrap helper
    cmds:
      - bash '{{.APEXPLANE_TOOLKIT_DIR}}/scripts/bootstrap.sh' {{.CLI_ARGS}}

  tunnel:
    desc: Open a private service interface through an SSH local forward
    requires:
      vars: [REALM, PLATFORM, CLUSTER, SERVICE, LOCAL_PORT, REMOTE_PORT, URL_PATH]
    env:
      TUNNEL_REALM: '{{.REALM}}'
      TUNNEL_PLATFORM: '{{.PLATFORM}}'
      TUNNEL_CLUSTER: '{{.CLUSTER}}'
      TUNNEL_SERVICE: '{{.SERVICE}}'
      TUNNEL_LOCAL_PORT: '{{.LOCAL_PORT}}'
      TUNNEL_REMOTE_PORT: '{{.REMOTE_PORT}}'
      TUNNEL_URL_PATH: '{{.URL_PATH}}'
    cmds:
      - bash '{{.APEXPLANE_TOOLKIT_DIR}}/bin/tunnel' {{.CLI_ARGS}}

  vault:check:
    desc: Check that vault files are encrypted
    cmds:
      - sh '{{.APEXPLANE_TOOLKIT_DIR}}/scripts/ansible-vlint.sh' --check {{.CLI_ARGS}}

  vault:fix:
    desc: Encrypt unencrypted vault files
    cmds:
      - sh '{{.APEXPLANE_TOOLKIT_DIR}}/scripts/ansible-vlint.sh' --fix {{.CLI_ARGS}}

  test:
    desc: Run ApexPlane Control shared static tests against the current repository
    cmds:
      - APC_TARGET_REPO_ROOT="$PWD" uv run pytest '{{.APEXPLANE_TOOLKIT_DIR}}/tests/static'
