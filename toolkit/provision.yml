---

version: '3'

vars:
  REALM: '{{.REALM}}'
  PLATFORM: '{{.PLATFORM}}'
  CLUSTERS: '{{.CLUSTERS}}'

tasks:
  ping:
    desc: Ping {{.REALM}}-{{.PLATFORM}} clusters
    cmds:
      - for: {var: CLUSTERS}
        task: _cluster:ping
        vars:
          CLUSTER: '{{.ITEM}}'

  check:
    desc: Check {{.REALM}}-{{.PLATFORM}} clusters
    cmds:
      - for: {var: CLUSTERS}
        task: _cluster:check
        vars:
          CLUSTER: '{{.ITEM}}'

  assess:
    desc: Assess {{.REALM}}-{{.PLATFORM}} clusters
    cmds:
      - for: {var: CLUSTERS}
        task: _cluster:assess
        vars:
          CLUSTER: '{{.ITEM}}'

  setup:
    desc: Setup {{.REALM}}-{{.PLATFORM}} clusters
    cmds:
      - for: {var: CLUSTERS}
        task: _cluster:setup
        vars:
          CLUSTER: '{{.ITEM}}'

  update:
    desc: Update {{.REALM}}-{{.PLATFORM}} clusters
    cmds:
      - for: {var: CLUSTERS}
        task: _cluster:update
        vars:
          CLUSTER: '{{.ITEM}}'

  _cluster:ping:
    internal: true
    cmds:
      - task apc:run -- {{.REALM}} {{.PLATFORM}} {{.CLUSTER}} cmd uptime

  _cluster:check:
    internal: true
    cmds:
      - task apc:migrate -- apply {{.REALM}} {{.PLATFORM}} {{.CLUSTER}}
      - task apc:run -- {{.REALM}} {{.PLATFORM}} {{.CLUSTER}} setup

  _cluster:assess:
    internal: true
    cmds:
      - task apc:run -- {{.REALM}} {{.PLATFORM}} {{.CLUSTER}} assess

  _cluster:setup:
    internal: true
    cmds:
      - DRY=0 task apc:migrate -- apply {{.REALM}} {{.PLATFORM}} {{.CLUSTER}}
      - DRY=0 task apc:run -- {{.REALM}} {{.PLATFORM}} {{.CLUSTER}} setup

  _cluster:update:
    internal: true
    cmds:
      - DRY=0 task apc:migrate -- apply {{.REALM}} {{.PLATFORM}} {{.CLUSTER}}
      - DRY=0 task apc:run -- {{.REALM}} {{.PLATFORM}} {{.CLUSTER}} update
